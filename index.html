<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMART-AV | 3D Бумажный каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        
        canvas {
            display: block;
        }
        
        .header {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 200, 255, 0.4);
        }
        
        .logo span {
            color: #00c8ff;
        }
        
        .subtitle {
            color: #a0b0ff;
            font-size: 16px;
            opacity: 0.9;
        }
        
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        
        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.9), rgba(0, 136, 221, 0.9));
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
            box-shadow: 0 5px 15px rgba(0, 200, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 255, 0.5);
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .page-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        
        .hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #8899cc;
            text-align: center;
            line-height: 1.6;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #00c8ff;
            z-index: 1000;
        }
        
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 200, 255, 0.15);
            border: 2px solid rgba(0, 200, 255, 0.4);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fullscreen-btn:hover {
            background: rgba(0, 200, 255, 0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SMART<span>AV</span></div>
        <p class="subtitle">3D бумажный каталог с реалистичной физикой</p>
    </div>
    
    <button class="fullscreen-btn" id="fullscreen-btn">⛶</button>
    
    <div class="page-indicator">
        Страница: <span id="current-page">0</span> / <span id="total-pages">15</span>
    </div>
    
    <div class="controls">
        <button id="prev-btn" class="btn">◀ Назад</button>
        <button id="next-btn" class="btn">Вперед ▶</button>
        <button id="reset-btn" class="btn">↻ Сброс</button>
    </div>
    
    <div class="hint">
        <p>• <strong>ЛКМ + движение</strong> – вращать книгу</p>
        <p>• <strong>ПКМ + движение</strong> – перемещать камеру</p>
        <p>• <strong>Колесо мыши</strong> – приблизить/отдалить</p>
        <p>• <strong>Клик по странице</strong> – перевернуть</p>
        <p>• <strong>Перетащите край страницы</strong> – плавное листание</p>
    </div>
    
    <div class="loading" id="loading">
        Загрузка 3D книги...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';

        // Глобальные переменные
        let scene, camera, renderer, orbitControls, dragControls;
        let book, pages = [];
        let currentPageIndex = 0;
        let isTurning = false;
        let interactivePages = [];
        
        // Размеры страницы
        const PAGE_WIDTH = 8;
        const PAGE_HEIGHT = 6;
        const PAGE_THICKNESS = 0.02;
        const PAGE_CURVATURE = 0.5; // Изгиб страницы
        
        // Изображения для страниц (0-15)
        const PAGE_IMAGES = [
            'SMART-AV_company0.jpg',   // 0 - Обложка
            'SMART-AV_company1.jpg',   // 1 - Разворот 1-2
            'SMART-AV_company2.jpg',   // 2
            'SMART-AV_company3.jpg',   // 3 - Разворот 3-4
            'SMART-AV_company4.jpg',   // 4
            'SMART-AV_company5.jpg',   // 5 - Разворот 5-6
            'SMART-AV_company6.jpg',   // 6
            'SMART-AV_company7.jpg',   // 7 - Разворот 7-8
            'SMART-AV_company8.jpg',   // 8
            'SMART-AV_company9.jpg',   // 9 - Разворот 9-10
            'SMART-AV_company10.jpg',  // 10
            'SMART-AV_company11.jpg',  // 11 - Разворот 11-12
            'SMART-AV_company12.jpg',  // 12
            'SMART-AV_company13.jpg',  // 13 - Разворот 13-14
            'SMART-AV_company14.jpg',  // 14
            'SMART-AV_company15.jpg'   // 15 - Задняя обложка
        ];

        // Система анимаций
        const animations = [];
        function animateTo(target, property, endValue, duration = 1000, easing = 'easeInOut') {
            const startValue = target[property];
            const startTime = Date.now();
            
            const animation = {
                target,
                property,
                startValue,
                endValue,
                startTime,
                duration,
                easing,
                update: function() {
                    const elapsed = Date.now() - this.startTime;
                    let progress = Math.min(elapsed / this.duration, 1);
                    
                    // Easing функции
                    if (this.easing === 'easeInOut') {
                        progress = progress < 0.5 
                            ? 2 * progress * progress 
                            : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                    } else if (this.easing === 'easeOut') {
                        progress = 1 - Math.pow(1 - progress, 3);
                    }
                    
                    this.target[this.property] = this.startValue + (this.endValue - this.startValue) * progress;
                    
                    if (progress >= 1) {
                        const index = animations.indexOf(this);
                        if (index > -1) animations.splice(index, 1);
                    }
                }
            };
            
            animations.push(animation);
            return animation;
        }

        // Инициализация
        async function init() {
            // Создаем сцену
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            
            // Создаем камеру
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 12);
            
            // Создаем рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.left = -10;
            directionalLight.shadow.camera.right = 10;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            scene.add(directionalLight);
            
            // Создаем книгу
            book = new THREE.Group();
            scene.add(book);
            
            // Загружаем текстуры и создаем страницы
            await createPages();
            
            // Настройка управления
            setupControls();
            
            // Скрываем загрузку
            document.getElementById('loading').style.display = 'none';
            
            // Обновляем индикатор
            updatePageIndicator();
            
            // Анимационный цикл
            animate();
        }

        async function createPages() {
            // Создаем геометрию для страницы с изгибом
            const pageGeometry = createCurvedPageGeometry();
            
            for (let i = 0; i < PAGE_IMAGES.length; i++) {
                const pageGroup = new THREE.Group();
                
                // Загружаем текстуру
                let texture;
                try {
                    texture = await loadTexture(`images/${PAGE_IMAGES[i]}`);
                } catch (error) {
                    // Создаем заглушку
                    const canvas = document.createElement('canvas');
                    canvas.width = 1024;
                    canvas.height = 768;
                    const ctx = canvas.getContext('2d');
                    
                    if (i === 0) {
                        // Обложка
                        ctx.fillStyle = '#2c3e50';
                        ctx.fillRect(0, 0, 1024, 768);
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 60px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('SMART-AV', 512, 300);
                        ctx.font = '30px Arial';
                        ctx.fillText('Каталог', 512, 380);
                    } else if (i === PAGE_IMAGES.length - 1) {
                        // Задняя обложка
                        ctx.fillStyle = '#34495e';
                        ctx.fillRect(0, 0, 1024, 768);
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 40px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('Задняя обложка', 512, 384);
                    } else {
                        // Внутренние страницы
                        ctx.fillStyle = i % 2 === 0 ? '#f8f9fa' : '#ffffff';
                        ctx.fillRect(0, 0, 1024, 768);
                        ctx.fillStyle = '#333';
                        ctx.font = 'bold 40px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(`Страница ${i}`, 512, 384);
                        ctx.font = '20px Arial';
                        ctx.fillText('SMART-AV', 512, 450);
                    }
                    
                    texture = new THREE.CanvasTexture(canvas);
                }
                
                texture.encoding = THREE.sRGBEncoding;
                
                // Создаем материал с текстурой
                const frontMaterial = new THREE.MeshStandardMaterial({ 
                    map: texture,
                    roughness: 0.7,
                    metalness: 0.1,
                    side: THREE.FrontSide
                });
                
                const backMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xf5f5f5,
                    roughness: 0.8,
                    metalness: 0.05,
                    side: THREE.BackSide
                });
                
                // Создаем меш с двойным материалом
                const pageMesh = new THREE.Mesh(pageGeometry, [backMaterial, frontMaterial]);
                pageMesh.castShadow = true;
                pageMesh.receiveShadow = true;
                
                // Настройка позиции и поворота
                if (i === 0) {
                    // Обложка
                    pageGroup.rotation.y = Math.PI / 2;
                    pageGroup.position.x = PAGE_WIDTH / 2;
                } else if (i === PAGE_IMAGES.length - 1) {
                    // Задняя обложка
                    pageGroup.rotation.y = -Math.PI / 2;
                    pageGroup.position.x = -PAGE_WIDTH / 2;
                } else {
                    // Внутренние страницы
                    const isRightPage = i % 2 === 0;
                    pageGroup.rotation.y = isRightPage ? Math.PI / 2 : -Math.PI / 2;
                    pageGroup.position.x = isRightPage ? PAGE_WIDTH / 2 : -PAGE_WIDTH / 2;
                    
                    // Для левых страниц сразу переворачиваем
                    if (!isRightPage) {
                        pageGroup.userData.isFlipped = true;
                    }
                }
                
                // Смещаем страницы по Z, чтобы они не пересекались
                pageGroup.position.z = -i * PAGE_THICKNESS * 1.5;
                
                pageGroup.add(pageMesh);
                book.add(pageGroup);
                
                // Сохраняем страницу
                pages.push({
                    group: pageGroup,
                    mesh: pageMesh,
                    index: i,
                    isRightPage: i % 2 === 0,
                    isCover: i === 0 || i === PAGE_IMAGES.length - 1
                });
                
                // Для интерактивных страниц (не обложки)
                if (i > 0 && i < PAGE_IMAGES.length - 1) {
                    interactivePages.push(pageGroup);
                }
            }
        }

        function createCurvedPageGeometry() {
            // Создаем геометрию с изгибом для реалистичности
            const geometry = new THREE.PlaneGeometry(PAGE_WIDTH, PAGE_HEIGHT, 32, 32);
            
            // Применяем изгиб
            const position = geometry.attributes.position;
            for (let i = 0; i < position.count; i++) {
                const x = position.getX(i);
                const z = position.getZ(i);
                
                // Изгиб по краям
                const curve = Math.sin((x / PAGE_WIDTH + 0.5) * Math.PI) * PAGE_CURVATURE;
                position.setZ(i, curve);
            }
            
            geometry.computeVertexNormals();
            return geometry;
        }

        function loadTexture(url) {
            return new Promise((resolve, reject) => {
                new THREE.TextureLoader().load(url, resolve, undefined, reject);
            });
        }

        function setupControls() {
            // OrbitControls для вращения камеры
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;
            orbitControls.minDistance = 5;
            orbitControls.maxDistance = 20;
            orbitControls.maxPolarAngle = Math.PI / 2;
            
            // DragControls для перетаскивания страниц
            dragControls = new DragControls(interactivePages, camera, renderer.domElement);
            dragControls.addEventListener('dragstart', (event) => {
                orbitControls.enabled = false;
            });
            
            dragControls.addEventListener('dragend', (event) => {
                orbitControls.enabled = true;
                
                // Проверяем, нужно ли перевернуть страницу
                const pageGroup = event.object;
                const pageIndex = pages.findIndex(p => p.group === pageGroup);
                const page = pages[pageIndex];
                
                if (page && !page.isCover) {
                    const rotation = pageGroup.rotation.y;
                    const shouldFlip = Math.abs(rotation) > Math.PI / 4;
                    
                    if (shouldFlip) {
                        flipPage(pageIndex);
                    } else {
                        // Возвращаем на место
                        const targetRotation = page.isRightPage ? Math.PI / 2 : -Math.PI / 2;
                        animateTo(pageGroup.rotation, 'y', targetRotation, 500);
                    }
                }
            });
            
            // Обработчики кнопок
            document.getElementById('prev-btn').addEventListener('click', () => flipToPage(-1));
            document.getElementById('next-btn').addEventListener('click', () => flipToPage(1));
            document.getElementById('reset-btn').addEventListener('click', resetBook);
            document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);
            
            // Клик по странице для перелистывания
            renderer.domElement.addEventListener('click', (event) => {
                event.preventDefault();
                
                // Получаем координаты клика
                const rect = renderer.domElement.getBoundingClientRect();
                const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                // Raycast для определения кликнутой страницы
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
                
                const intersects = raycaster.intersectObjects(interactivePages, true);
                
                if (intersects.length > 0) {
                    const pageGroup = intersects[0].object.parent;
                    const pageIndex = pages.findIndex(p => p.group === pageGroup);
                    
                    if (pageIndex > -1 && !pages[pageIndex].isCover) {
                        flipPage(pageIndex);
                    }
                }
            });
            
            // Клавиатура
            document.addEventListener('keydown', (event) => {
                if (event.key === 'ArrowLeft') flipToPage(-1);
                if (event.key === 'ArrowRight') flipToPage(1);
                if (event.key === ' ') flipCurrentPage();
                if (event.key === 'Home') goToPage(0);
                if (event.key === 'End') goToPage(PAGE_IMAGES.length - 1);
                if (event.key === 'f' || event.key === 'F') toggleFullscreen();
            });
        }

        function flipPage(pageIndex) {
            if (isTurning) return;
            
            const page = pages[pageIndex];
            if (!page || page.isCover) return;
            
            isTurning = true;
            
            // Определяем целевой поворот
            const targetRotation = page.group.userData.isFlipped 
                ? (page.isRightPage ? Math.PI / 2 : -Math.PI / 2)
                : (page.isRightPage ? -Math.PI / 2 : Math.PI / 2);
            
            // Анимируем поворот
            const animation = animateTo(page.group.rotation, 'y', targetRotation, 1200, 'easeOut');
            
            // Звук перелистывания
            playPageSound();
            
            // Обновляем состояние
            animation.onComplete = () => {
                page.group.userData.isFlipped = !page.group.userData.isFlipped;
                isTurning = false;
                
                // Обновляем текущую страницу
                if (!page.group.userData.isFlipped) {
                    currentPageIndex = Math.max(0, currentPageIndex - 1);
                } else {
                    currentPageIndex = Math.min(PAGE_IMAGES.length - 1, currentPageIndex + 1);
                }
                
                updatePageIndicator();
            };
        }

        function flipToPage(direction) {
            if (isTurning) return;
            
            // Находим следующую переворачиваемую страницу
            let targetPageIndex = -1;
            
            if (direction > 0) {
                // Ищем следующую неперевернутую правую страницу
                for (let i = currentPageIndex; i < pages.length; i++) {
                    if (!pages[i].isCover && pages[i].isRightPage && !pages[i].group.userData.isFlipped) {
                        targetPageIndex = i;
                        break;
                    }
                }
            } else {
                // Ищем предыдущую перевернутую левую страницу
                for (let i = currentPageIndex; i >= 0; i--) {
                    if (!pages[i].isCover && !pages[i].isRightPage && pages[i].group.userData.isFlipped) {
                        targetPageIndex = i;
                        break;
                    }
                }
            }
            
            if (targetPageIndex > -1) {
                flipPage(targetPageIndex);
            }
        }

        function flipCurrentPage() {
            // Переворачиваем текущую страницу
            const currentPage = pages[currentPageIndex];
            if (currentPage && !currentPage.isCover) {
                flipPage(currentPageIndex);
            }
        }

        function goToPage(pageIndex) {
            // Сбрасываем все страницы
            pages.forEach((page, index) => {
                if (!page.isCover) {
                    const targetRotation = index <= pageIndex 
                        ? (page.isRightPage ? -Math.PI / 2 : Math.PI / 2)
                        : (page.isRightPage ? Math.PI / 2 : -Math.PI / 2);
                    
                    page.group.rotation.y = targetRotation;
                    page.group.userData.isFlipped = index <= pageIndex;
                }
            });
            
            currentPageIndex = pageIndex;
            updatePageIndicator();
        }

        function resetBook() {
            goToPage(0);
        }

        function updatePageIndicator() {
            document.getElementById('current-page').textContent = currentPageIndex;
            document.getElementById('total-pages').textContent = PAGE_IMAGES.length - 1;
            
            // Обновляем состояние кнопок
            document.getElementById('prev-btn').disabled = currentPageIndex <= 0;
            document.getElementById('next-btn').disabled = currentPageIndex >= PAGE_IMAGES.length - 1;
        }

        function playPageSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 120 + Math.random() * 40;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.015, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch (e) {
                // Игнорируем ошибки аудио
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fullscreen-btn').textContent = '✕';
            } else {
                document.exitFullscreen();
                document.getElementById('fullscreen-btn').textContent = '⛶';
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Обновляем анимации
            animations.forEach(anim => anim.update());
            
            // Обновляем управление
            orbitControls.update();
            
            // Рендерим сцену
            renderer.render(scene, camera);
        }

        // Инициализация
        window.addEventListener('load', init);
        window.addEventListener('resize', onWindowResize);
        
        // Обработчик полноэкранного режима
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('fullscreen-btn').textContent = '⛶';
            }
        });
    </script>
</body>
</html>
