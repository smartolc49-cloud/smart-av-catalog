<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV | 3D Каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 20px;
            transition: background 0.5s;
        }
        
        body.fullscreen {
            padding: 0;
            background: #000;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 1200px;
            transition: all 0.3s;
        }
        
        body.fullscreen .header {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
        }
        
        .logo {
            font-size: 52px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            letter-spacing: 1px;
        }
        
        .logo span {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .subtitle {
            color: #a0b0ff;
            font-size: 18px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .main-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        /* КОНТЕЙНЕР КНИГИ */
        .book-wrapper {
            width: 1000px;
            height: 700px;
            position: relative;
            perspective: 2500px;
            margin-bottom: 30px;
            transition: all 0.5s ease;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        
        body.fullscreen .book-wrapper {
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            margin: 0;
            box-shadow: none;
        }
        
        @media (max-width: 1100px) {
            .book-wrapper {
                width: 90vw;
                height: calc(90vw * 0.7);
            }
        }
        
        @media (max-width: 768px) {
            .book-wrapper {
                width: 95vw;
                height: calc(95vw * 0.7);
            }
            .logo { font-size: 42px; }
        }
        
        /* КНИГА */
        #book {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }
        
        /* СТРАНИЦЫ - ИСПРАВЛЕННАЯ ЛОГИКА */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            background: white;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.1),
                0 5px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            border-radius: 1px;
        }
        
        /* СПЕЦИАЛЬНО: ПЕРВАЯ СТРАНИЦА - ОДНА НА ВЕСЬ ЭКРАН */
        .page.first {
            left: 0;
            width: 100%;
            transform-origin: left center;
        }
        
        /* ПРАВАЯ СТРАНИЦА (для разворота) */
        .page.right {
            left: 50%;
            width: 50%;
            transform-origin: left center;
        }
        
        /* ЛЕВАЯ СТРАНИЦА (для разворота) */
        .page.left {
            left: 0;
            width: 50%;
            transform-origin: right center;
        }
        
        /* ИЗОБРАЖЕНИЕ */
        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        
        /* УГОЛКИ ДЛЯ ПЕРЕТАСКИВАНИЯ */
        .page-corner {
            position: absolute;
            width: 120px;
            height: 120px;
            cursor: grab;
            z-index: 100;
            transition: background 0.3s;
        }
        
        .page.first .page-corner,
        .page.right .page-corner {
            top: 0;
            right: 0;
            background: linear-gradient(225deg, transparent 50%, rgba(0, 212, 255, 0.1) 50%);
        }
        
        .page.first .page-corner:hover,
        .page.right .page-corner:hover {
            background: linear-gradient(225deg, transparent 50%, rgba(0, 212, 255, 0.25) 50%);
        }
        
        .page.left .page-corner {
            top: 0;
            left: 0;
            background: linear-gradient(135deg, transparent 50%, rgba(0, 212, 255, 0.1) 50%);
        }
        
        .page.left .page-corner:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(0, 212, 255, 0.25) 50%);
        }
        
        /* НОМЕР СТРАНИЦЫ */
        .page-number {
            position: absolute;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .page.first .page-number,
        .page.right .page-number {
            right: 20px;
        }
        
        .page.left .page-number {
            left: 20px;
        }
        
        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            margin: 30px 0;
            padding: 20px 40px;
            background: rgba(0, 20, 40, 0.7);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            position: relative;
            z-index: 1000;
        }
        
        body.fullscreen .control-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
        }
        
        /* БОЛЬШИЕ КНОПКИ */
        .big-btn {
            padding: 18px 50px !important;
            font-size: 22px !important;
            min-width: 180px !important;
            height: 70px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 15px !important;
        }
        
        .control-btn {
            padding: 16px 45px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: white;
            border: none;
            border-radius: 35px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .control-btn:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.6);
        }
        
        .control-btn:hover:not(:disabled)::before {
            left: 100%;
        }
        
        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }
        
        /* ИНФОРМАЦИЯ О СТРАНИЦЕ */
        .page-info {
            font-size: 28px;
            color: #00d4ff;
            font-weight: 700;
            min-width: 160px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
            padding: 0 25px;
        }
        
        .page-info span {
            color: white;
            font-size: 32px;
        }
        
        /* КНОПКА ПОЛНОГО ЭКРАНА */
        .fullscreen-btn {
            position: absolute !important;
            top: 20px;
            right: 20px;
            width: 60px !important;
            height: 60px !important;
            min-width: auto !important;
            padding: 0 !important;
            border-radius: 50% !important;
            background: rgba(0, 212, 255, 0.2) !important;
            border: 2px solid rgba(0, 212, 255, 0.5) !important;
            z-index: 1001;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        .fullscreen-btn:hover {
            background: rgba(0, 212, 255, 0.4) !important;
        }
        
        /* БЫСТРАЯ НАВИГАЦИЯ */
        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
            max-width: 800px;
        }
        
        .quick-btn {
            padding: 12px 25px;
            background: rgba(0, 212, 255, 0.15);
            border: 2px solid rgba(0, 212, 255, 0.4);
            color: #00d4ff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            min-width: 50px;
            text-align: center;
        }
        
        .quick-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        
        .quick-btn.active {
            background: #00d4ff;
            color: #0a0a2a;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        /* СТАТУС */
        .status {
            padding: 20px 40px;
            border-radius: 15px;
            margin: 20px auto;
            text-align: center;
            max-width: 600px;
            display: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .loading {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 100, 255, 0.1));
            color: #00d4ff;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .success {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.1), rgba(0, 200, 100, 0.1));
            color: #00ff88;
            border: 2px solid rgba(0, 255, 100, 0.3);
        }
        
        .error {
            background: linear-gradient(135deg, rgba(255, 50, 50, 0.1), rgba(200, 0, 0, 0.1));
            color: #ff5555;
            border: 2px solid rgba(255, 50, 50, 0.3);
        }
        
        /* АНИМАЦИИ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        
        /* ПОДСКАЗКА */
        .hint {
            color: #8899cc;
            font-size: 16px;
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
            max-width: 800px;
        }
        
        /* ОПТИМИЗАЦИЯ ДЛЯ БОЛЬШИХ ИЗОБРАЖЕНИЙ */
        .page-image.optimized {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
        }
    </style>
</head>
<body>
    <div class="header fade-in">
        <div class="logo">SMART<span>AV</span></div>
        <p class="subtitle">Интерактивный 3D каталог с эффектом перелистывания</p>
    </div>
    
    <div class="main-container">
        <button id="fullscreen-toggle" class="control-btn fullscreen-btn" title="Полный экран">
            <span id="fullscreen-icon">⛶</span>
        </button>
        
        <div class="book-wrapper">
            <div id="book"></div>
        </div>
        
        <div id="status" class="status loading fade-in">
            Оптимизация и загрузка изображений...
        </div>
        
        <div class="control-panel fade-in">
            <button id="prev-btn" class="control-btn big-btn" disabled>
                <span style="font-size: 28px;">◀</span> НАЗАД
            </button>
            
            <div class="page-info">
                <span id="current-page">1</span> / <span id="total-pages">16</span>
            </div>
            
            <button id="next-btn" class="control-btn big-btn" disabled>
                ВПЕРЕД <span style="font-size: 28px;">▶</span>
            </button>
        </div>
        
        <div class="quick-nav" id="quick-nav"></div>
        
        <div class="hint fade-in">
            <p>• Первая страница отображается отдельно, остальные - попарно</p>
            <p>• Используйте большие кнопки или клавиши ← → для навигации</p>
            <p>• Нажмите ⛶ для полноэкранного режима</p>
        </div>
    </div>

    <script>
        // УЛУЧШЕННЫЙ КЛАСС КНИГИ С ОПТИМИЗАЦИЕЙ
        class OptimizedBook {
            constructor(containerId, pages) {
                this.container = document.getElementById(containerId);
                this.pages = pages;
                this.currentSpread = 0; // 0 = первая страница, 1 = 2-3, 2 = 4-5 и т.д.
                this.isTurning = false;
                this.isDragging = false;
                this.dragStartX = 0;
                this.currentAngle = 0;
                this.dragPage = null;
                this.dragDirection = 0;
                this.pageElements = [];
                this.isFullscreen = false;
                this.imagesLoaded = 0;
                
                this.init();
            }
            
            async init() {
                this.showStatus('loading', 'Оптимизация изображений...');
                await this.loadAndOptimizeImages();
                this.createPages();
                this.setupEventListeners();
                this.createQuickNavigation();
                this.showSpread(0);
                this.updateControls();
                
                this.showStatus('success', '✓ Каталог загружен! Все страницы доступны.');
            }
            
            async loadAndOptimizeImages() {
                const total = this.pages.length;
                
                // Загружаем с оптимизацией
                const promises = this.pages.map((filename, index) => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        
                        img.onload = () => {
                            this.imagesLoaded++;
                            const percent = Math.round((this.imagesLoaded / total) * 100);
                            this.showStatus('loading', `Загрузка: ${percent}% (${this.imagesLoaded}/${total})`);
                            
                            // ОПТИМИЗАЦИЯ: Создаем canvas для уменьшения размера
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            
                            // Уменьшаем размер для веба (максимум 1200px по ширине)
                            const maxWidth = 1200;
                            let width = img.width;
                            let height = img.height;
                            
                            if (width > maxWidth) {
                                height = (maxWidth / width) * height;
                                width = maxWidth;
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // Сохраняем оптимизированное изображение
                            img.src = canvas.toDataURL('image/jpeg', 0.8);
                            resolve({ index, img, optimized: true });
                        };
                        
                        img.onerror = () => {
                            this.imagesLoaded++;
                            // Заглушка для ошибок
                            const canvas = document.createElement('canvas');
                            canvas.width = 1000;
                            canvas.height = 700;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#1a1a2a';
                            ctx.fillRect(0, 0, 1000, 700);
                            ctx.fillStyle = '#4a4a6a';
                            ctx.font = '40px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText(`Страница ${index + 1}`, 500, 350);
                            img.src = canvas.toDataURL();
                            resolve({ index, img, optimized: false });
                        };
                        
                        img.src = `images/${filename}`;
                    });
                });
                
                await Promise.all(promises);
            }
            
            createPages() {
                this.container.innerHTML = '';
                this.pageElements = [];
                
                // ПЕРВАЯ СТРАНИЦА - ОТДЕЛЬНО
                const firstPage = this.createPageElement(1, this.pages[0], 'first');
                this.container.appendChild(firstPage);
                this.pageElements.push(firstPage);
                
                // ОСТАЛЬНЫЕ СТРАНИЦЫ - ПОПАРНО
                for (let i = 1; i < this.pages.length; i += 2) {
                    const leftPageNum = i + 1;
                    const rightPageNum = i + 2;
                    
                    // Левая страница
                    const leftPage = this.createPageElement(leftPageNum, this.pages[i], 'left');
                    this.container.appendChild(leftPage);
                    this.pageElements.push(leftPage);
                    
                    // Правая страница (если есть)
                    if (rightPageNum <= this.pages.length) {
                        const rightPage = this.createPageElement(rightPageNum, this.pages[i + 1], 'right');
                        this.container.appendChild(rightPage);
                        this.pageElements.push(rightPage);
                    }
                }
            }
            
            createPageElement(pageNum, filename, type) {
                const page = document.createElement('div');
                page.className = `page ${type}`;
                page.dataset.page = pageNum;
                page.dataset.type = type;
                
                const img = document.createElement('img');
                img.className = 'page-image optimized';
                img.src = `images/${filename}`;
                img.alt = `Страница ${pageNum}`;
                img.loading = "lazy"; // Ленивая загрузка
                
                const corner = document.createElement('div');
                corner.className = 'page-corner';
                corner.title = 'Перетащите для перелистывания';
                
                const number = document.createElement('div');
                number.className = 'page-number';
                number.textContent = pageNum;
                
                page.appendChild(img);
                page.appendChild(corner);
                page.appendChild(number);
                
                return page;
            }
            
            setupEventListeners() {
                // Большие кнопки
                document.getElementById('prev-btn').addEventListener('click', () => this.turnPage(-1));
                document.getElementById('next-btn').addEventListener('click', () => this.turnPage(1));
                
                // Клавиатура
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.turnPage(-1);
                    if (e.key === 'ArrowRight') this.turnPage(1);
                    if (e.key === 'f' || e.key === 'F') this.toggleFullscreen();
                    if (e.key === 'Escape' && this.isFullscreen) this.toggleFullscreen();
                });
                
                // Полноэкранный режим
                document.getElementById('fullscreen-toggle').addEventListener('click', () => this.toggleFullscreen());
                
                // События для перетаскивания
                this.setupDragEvents();
            }
            
            setupDragEvents() {
                this.pageElements.forEach(page => {
                    const corner = page.querySelector('.page-corner');
                    
                    corner.addEventListener('mousedown', (e) => this.startDrag(e, page));
                    corner.addEventListener('touchstart', (e) => this.startDrag(e, page));
                });
                
                document.addEventListener('mousemove', (e) => this.handleDrag(e));
                document.addEventListener('touchmove', (e) => this.handleDrag(e));
                document.addEventListener('mouseup', () => this.endDrag());
                document.addEventListener('touchend', () => this.endDrag());
            }
            
            startDrag(e, page) {
                if (this.isTurning) return;
                
                e.preventDefault();
                this.isDragging = true;
                this.dragPage = page;
                
                const pageNum = parseInt(page.dataset.page);
                const type = page.dataset.type;
                
                // Определяем направление
                if (type === 'first' || type === 'right') {
                    this.dragDirection = 1; // Вперед
                } else {
                    this.dragDirection = -1; // Назад
                }
                
                const clientX = e.clientX || e.touches[0].clientX;
                this.dragStartX = clientX;
                this.currentAngle = 0;
                
                page.style.transition = 'none';
                page.style.zIndex = '1000';
            }
            
            handleDrag(e) {
                if (!this.isDragging || !this.dragPage) return;
                
                e.preventDefault();
                const clientX = e.clientX || e.touches[0].clientX;
                const deltaX = clientX - this.dragStartX;
                
                let angle = 0;
                if (this.dragDirection === 1) {
                    angle = Math.max(-180, deltaX * -0.6);
                } else {
                    angle = Math.min(180, deltaX * 0.6);
                }
                
                // Эффект гибкости
                const curve = Math.sin(Math.abs(angle) * Math.PI / 360) * 5;
                this.dragPage.style.transform = `rotateY(${angle}deg) translateX(${curve}px)`;
                this.currentAngle = angle;
            }
            
            endDrag() {
                if (!this.isDragging || !this.dragPage) return;
                
                this.isDragging = false;
                this.dragPage.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                
                if (Math.abs(this.currentAngle) > 100) {
                    this.turnPage(this.dragDirection);
                } else {
                    this.dragPage.style.transform = 'rotateY(0deg) translateX(0px)';
                    setTimeout(() => {
                        this.dragPage.style.zIndex = '2';
                    }, 800);
                }
                
                this.dragPage = null;
            }
            
            async turnPage(direction) {
                if (this.isTurning) return;
                
                const newSpread = this.currentSpread + direction;
                const totalSpreads = Math.ceil(this.pages.length / 2);
                
                if (newSpread < 0 || newSpread >= totalSpreads) return;
                
                this.isTurning = true;
                
                // Находим страницу для анимации
                let pageToTurn = null;
                
                if (direction === 1) {
                    // Вперед: перелистываем правую страницу текущего разворота
                    if (this.currentSpread === 0) {
                        pageToTurn = this.pageElements.find(p => p.dataset.page === '1');
                    } else {
                        const rightPageNum = this.currentSpread * 2 + 1;
                        pageToTurn = this.pageElements.find(p => p.dataset.page === rightPageNum.toString());
                    }
                } else {
                    // Назад: перелистываем левую страницу текущего разворота
                    const leftPageNum = this.currentSpread * 2;
                    pageToTurn = this.pageElements.find(p => p.dataset.page === leftPageNum.toString());
                }
                
                if (pageToTurn) {
                    const targetAngle = direction === 1 ? -180 : 180;
                    pageToTurn.style.transform = `rotateY(${targetAngle}deg)`;
                    
                    this.playFlipSound();
                    
                    await new Promise(resolve => setTimeout(resolve, 800));
                    
                    this.currentSpread = newSpread;
                    this.showSpread(this.currentSpread);
                    this.updateControls();
                    
                    pageToTurn.style.transform = 'rotateY(0deg)';
                }
                
                this.isTurning = false;
            }
            
            showSpread(spreadIndex) {
                // Скрываем все страницы
                this.pageElements.forEach(page => {
                    page.style.opacity = '0';
                    page.style.pointerEvents = 'none';
                    page.style.zIndex = '1';
                });
                
                // Показываем нужный разворот
                if (spreadIndex === 0) {
                    // Первая страница отдельно
                    const firstPage = this.pageElements.find(p => p.dataset.page === '1');
                    if (firstPage) {
                        firstPage.style.opacity = '1';
                        firstPage.style.pointerEvents = 'auto';
                        firstPage.style.zIndex = '2';
                    }
                } else {
                    // Разворот: левая и правая страницы
                    const leftPageNum = spreadIndex * 2;
                    const rightPageNum = spreadIndex * 2 + 1;
                    
                    const leftPage = this.pageElements.find(p => p.dataset.page === leftPageNum.toString());
                    const rightPage = this.pageElements.find(p => p.dataset.page === rightPageNum.toString());
                    
                    if (leftPage) {
                        leftPage.style.opacity = '1';
                        leftPage.style.pointerEvents = 'auto';
                        leftPage.style.zIndex = '2';
                    }
                    
                    if (rightPage) {
                        rightPage.style.opacity = '1';
                        rightPage.style.pointerEvents = 'auto';
                        rightPage.style.zIndex = '2';
                    }
                }
                
                // Обновляем активную кнопку
                const currentPage = spreadIndex === 0 ? 1 : spreadIndex * 2;
                document.querySelectorAll('.quick-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (parseInt(btn.dataset.page) === currentPage) {
                        btn.classList.add('active');
                    }
                });
            }
            
            updateControls() {
                const currentPage = this.currentSpread === 0 ? 1 : this.currentSpread * 2;
                document.getElementById('current-page').textContent = currentPage;
                document.getElementById('total-pages').textContent = this.pages.length;
                
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                
                prevBtn.disabled = this.currentSpread <= 0 || this.isTurning;
                nextBtn.disabled = this.currentSpread >= Math.ceil(this.pages.length / 2) - 1 || this.isTurning;
            }
            
            createQuickNavigation() {
                const quickNav = document.getElementById('quick-nav');
                
                for (let i = 1; i <= this.pages.length; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'quick-btn';
                    btn.textContent = i;
                    btn.dataset.page = i;
                    btn.addEventListener('click', () => this.goToPage(i));
                    quickNav.appendChild(btn);
                }
            }
            
            goToPage(targetPage) {
                if (targetPage < 1 || targetPage > this.pages.length || this.isTurning) return;
                
                // Вычисляем номер разворота
                let spreadIndex;
                if (targetPage === 1) {
                    spreadIndex = 0;
                } else {
                    spreadIndex = Math.floor((targetPage - 1) / 2) + 1;
                }
                
                this.currentSpread = spreadIndex;
                this.showSpread(this.currentSpread);
                this.updateControls();
                this.playFlipSound();
            }
            
            toggleFullscreen() {
                this.isFullscreen = !this.isFullscreen;
                
                if (this.isFullscreen) {
                    document.body.classList.add('fullscreen');
                    document.getElementById('fullscreen-icon').textContent = '✕';
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen?.();
                    }
                } else {
                    document.body.classList.remove('fullscreen');
                    document.getElementById('fullscreen-icon').textContent = '⛶';
                    if (document.fullscreenElement) {
                        document.exitFullscreen?.();
                    }
                }
            }
            
            playFlipSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    for (let i = 0; i < 2; i++) {
                        setTimeout(() => {
                            const oscillator = audioContext.createOscillator();
                            const gainNode = audioContext.createGain();
                            
                            oscillator.connect(gainNode);
                            gainNode.connect(audioContext.destination);
                            
                            oscillator.frequency.value = 100 + Math.random() * 50;
                            oscillator.type = 'sine';
                            
                            gainNode.gain.setValueAtTime(0.02, audioContext.currentTime);
                            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2);
                            
                            oscillator.start(audioContext.currentTime);
                            oscillator.stop(audioContext.currentTime + 0.2);
                        }, i * 30);
                    }
                } catch (e) {
                    // Браузер не поддерживает Web Audio API
                }
            }
            
            showStatus(type, message) {
                const status = document.getElementById('status');
                status.className = `status ${type} fade-in`;
                status.textContent = message;
                status.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        status.style.opacity = '0';
                        setTimeout(() => {
                            status.style.display = 'none';
                        }, 500);
                    }, 2500);
                }
            }
        }
        
        // ЗАПУСК КНИГИ
        window.addEventListener('load', async () => {
            // ВАШИ ФАЙЛЫ
            const imageFiles = [
                'SMART-AV_company0.jpg',   // Страница 1
                'SMART-AV_company1.jpg',   // Страница 2
                'SMART-AV_company2.jpg',   // Страница 3
                'SMART-AV_company3.jpg',   // Страница 4
                'SMART-AV_company4.jpg',   // Страница 5
                'SMART-AV_company5.jpg',   // Страница 6
                'SMART-AV_company6.jpg',   // Страница 7
                'SMART-AV_company7.jpg',   // Страница 8
                'SMART-AV_company8.jpg',   // Страница 9
                'SMART-AV_company9.jpg',   // Страница 10
                'SMART-AV_company10.jpg',  // Страница 11
                'SMART-AV_company11.jpg',  // Страница 12
                'SMART-AV_company12.jpg',  // Страница 13
                'SMART-AV_company13.jpg',  // Страница 14
                'SMART-AV_company14.jpg',  // Страница 15
                'SMART-AV_company15.jpg'   // Страница 16
            ];
            
            try {
                window.book = new OptimizedBook('book', imageFiles);
            } catch (error) {
                const status = document.getElementById('status');
                status.className = 'status error fade-in';
                status.textContent = `Ошибка: ${error.message}`;
                status.style.display = 'block';
            }
        });
        
        // Полноэкранный режим
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen');
                document.getElementById('fullscreen-icon').textContent = '⛶';
                if (window.book) window.book.isFullscreen = false;
            }
        });
    </script>
