<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMART-AV | Интерактивный 3D Каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .header {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        .logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 200, 255, 0.4);
        }
        .logo span { color: #00c8ff; }
        .subtitle {
            color: #a0b0ff;
            font-size: 16px;
            opacity: 0.9;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.9), rgba(0, 136, 221, 0.9));
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
            box-shadow: 0 5px 15px rgba(0, 200, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 255, 0.5);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .page-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #00c8ff;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SMART<span>AV</span></div>
        <p class="subtitle">Интерактивный 3D Каталог</p>
    </div>
    
    <div class="page-indicator">
        Разворот: <span id="current-page">0</span> / <span id="total-pages">0</span>
    </div>
    
    <div class="controls">
        <button id="prev-btn" class="btn">◀ Назад</button>
        <button id="next-btn" class="btn">Вперед ▶</button>
    </div>
    
    <div class="loading" id="loading">Загрузка каталога...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let scene, camera, renderer, controls;
        let book; 
        const sheets = []; // Массив для хранения "листов" книги
        let currentSheet = 0;
        let isTurning = false;

        // --- КОНФИГУРАЦИЯ КНИГИ ---
        const PAGE_WIDTH = 8;
        const PAGE_HEIGHT = PAGE_WIDTH * 1.414; // Пропорции A4 (√2)
        const PAGE_THICKNESS = 0.03; // Толщина одного листа
        const TOTAL_IMAGES = 16; // Общее количество JPG-файлов
        const TOTAL_SHEETS = TOTAL_IMAGES / 2; // Количество листов в книге

        // --- Tween-движок для плавной анимации ---
        const tweens = [];
        function tween(object, property, targetValue, duration, onComplete = () => {}) {
            const startValue = object[property];
            const startTime = Date.now();
            const t = {
                update: () => {
                    const elapsed = Date.now() - startTime;
                    let progress = Math.min(elapsed / duration, 1);
                    // Easing (смягчение) для плавности
                    progress = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                    object[property] = startValue + (targetValue - startValue) * progress;
                    if (progress >= 1) {
                        tweens.splice(tweens.indexOf(t), 1);
                        onComplete();
                    }
                }
            };
            tweens.push(t);
        }

        // --- ИНИЦИАЛИЗАЦИЯ ---
        init();
        animate();

        async function init() {
            // 1. Сцена
            scene = new THREE.Scene();

            // 2. Камера
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 18);
            camera.lookAt(0, 0, 0);

            // 3. Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // 4. Освещение
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -PAGE_WIDTH * 2;
            dirLight.shadow.camera.right = PAGE_WIDTH * 2;
            dirLight.shadow.camera.top = PAGE_HEIGHT * 2;
            dirLight.shadow.camera.bottom = -PAGE_HEIGHT * 2;
            scene.add(dirLight);

            // 5. Создание самой книги
            book = new THREE.Group();
            scene.add(book);
            
            await createBookSheets();
            
            // 6. Управление
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxDistance = 40;
            controls.minDistance = 10;
            controls.maxPolarAngle = Math.PI * 0.8;
            
            // 7. UI и события
            document.getElementById('loading').style.display = 'none';
            document.getElementById('total-pages').textContent = TOTAL_SHEETS -1;
            updateUI();
            
            document.getElementById('prev-btn').addEventListener('click', flipPrev);
            document.getElementById('next-btn').addEventListener('click', flipNext);
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') flipPrev();
                if (e.key === 'ArrowRight') flipNext();
            });
        }
        
        async function createBookSheets() {
            const textureLoader = new THREE.TextureLoader();
            const imagePath = 'images/SMART-AV_company'; // Путь к вашим изображениям
            
            // --- СОЗДАНИЕ ЛИСТОВ КНИГИ ---
            // Логика: каждый лист - это плоскость с двумя текстурами (лицо и оборот)
            
            for (let i = 0; i < TOTAL_SHEETS; i++) {
                const sheetGroup = new THREE.Group();
                const geometry = new THREE.PlaneGeometry(PAGE_WIDTH, PAGE_HEIGHT);

                // Индексы изображений для этого листа
                const frontImageIndex = i * 2;
                const backImageIndex = i * 2 + 1;
                
                // Загружаем текстуры для обеих сторон
                const frontTexture = await textureLoader.loadAsync(`${imagePath}${frontImageIndex}.jpg`);
                const backTexture = (backImageIndex < TOTAL_IMAGES) ? await textureLoader.loadAsync(`${imagePath}${backImageIndex}.jpg`) : null;

                // Материалы
                const frontMaterial = new THREE.MeshStandardMaterial({ map: frontTexture, side: THREE.FrontSide, roughness: 0.6 });
                // Если есть оборотная сторона, используем ее, иначе - просто серый цвет
                const backMaterial = backTexture 
                    ? new THREE.MeshStandardMaterial({ map: backTexture, side: THREE.BackSide, roughness: 0.6 })
                    : new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.BackSide, roughness: 0.6 });
                
                const sheetMesh = new THREE.Mesh(geometry, [frontMaterial, backMaterial]);
                sheetMesh.castShadow = true;
                sheetMesh.receiveShadow = true;
                
                // Важно: смещаем плоскость так, чтобы ее край был в центре группы
                sheetMesh.position.x = PAGE_WIDTH / 2;
                sheetGroup.add(sheetMesh);
                
                // Смещаем сам лист по оси Z для создания толщины стопки
                sheetGroup.position.z = -i * PAGE_THICKNESS;
                
                book.add(sheetGroup);
                sheets.push(sheetGroup);
            }
        }
        
        function flipNext() {
            if (isTurning || currentSheet >= sheets.length) return;
            
            isTurning = true;
            const sheetToFlip = sheets[currentSheet];
            
            tween(sheetToFlip.rotation, 'y', -Math.PI, 1500, () => {
                currentSheet++;
                isTurning = false;
                updateUI();
            });
            playPageSound();
        }

        function flipPrev() {
            if (isTurning || currentSheet <= 0) return;
            
            currentSheet--;
            isTurning = true;
            const sheetToFlip = sheets[currentSheet];

            tween(sheetToFlip.rotation, 'y', 0, 1500, () => {
                isTurning = false;
                updateUI();
            });
            playPageSound();
        }

        function updateUI() {
            // Обновляем номер страницы
            // Для пользователя "разворот 0" - это обложка, "разворот 1" - стр. 2-3 и т.д.
            const displayPage = (currentSheet === 0) ? 0 : Math.ceil((currentSheet * 2) / 2);
            document.getElementById('current-page').textContent = displayPage;
            
            // Включаем/выключаем кнопки
            document.getElementById('prev-btn').disabled = isTurning || currentSheet <= 0;
            document.getElementById('next-btn').disabled = isTurning || currentSheet >= sheets.length - 1;
        }

        function playPageSound() {
            // Простой синтезированный звук, чтобы не требовать аудио-файлы
             try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(1500, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.3);
                oscillator.type = 'square';
                
                gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.25);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch (e) {
                // Аудио может не работать в некоторых контекстах, это нормально
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            tweens.forEach(t => t.update());
            controls.update();
            renderer.render(scene, camera);
        }

    </script>
</body>
</html>
