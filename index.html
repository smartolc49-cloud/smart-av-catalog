<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV | 3D Бумажный каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        
        /* ХЕДЕР */
        .header {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        
        .logo {
            font-size: 42px;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 200, 255, 0.4);
            letter-spacing: 1px;
        }
        
        .logo span {
            color: #00c8ff;
        }
        
        .subtitle {
            color: #a0b0ff;
            font-size: 16px;
            opacity: 0.9;
        }
        
        /* КАНВАС Three.js */
        #container3d {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* ИНФО ПАНЕЛЬ */
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
        }
        
        /* КОНТРОЛЫ */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        .control-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.9), rgba(0, 136, 221, 0.9));
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 110px;
            box-shadow: 0 5px 15px rgba(0, 200, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .control-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 255, 0.5);
        }
        
        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* ПОДСКАЗКИ */
        .hints {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #8899cc;
            text-align: center;
            line-height: 1.6;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            font-size: 14px;
        }
        
        .hints p {
            margin: 5px 0;
        }
        
        /* ЗАГРУЗКА */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            text-align: center;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00c8ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ФУЛЛСКРИН */
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 200, 255, 0.15);
            border: 2px solid rgba(0, 200, 255, 0.4);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .fullscreen-btn:hover {
            background: rgba(0, 200, 255, 0.3);
            transform: scale(1.1);
        }
        
        /* ОТЛАДКА */
        .debug {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #00ff88;
            font-size: 12px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SMART<span>AV</span></div>
        <p class="subtitle">3D бумажный каталог с реалистичным листанием</p>
    </div>
    
    <div class="fullscreen-btn" id="fullscreen-btn" title="Полный экран">⛶</div>
    
    <div class="info-panel">
        Страница: <span id="current-page">1</span> / <span id="total-pages">7</span>
    </div>
    
    <div id="container3d"></div>
    
    <div class="controls">
        <button id="prev-btn" class="control-btn">← Назад</button>
        <button id="next-btn" class="control-btn">Вперед →</button>
        <button id="reset-btn" class="control-btn">Сброс</button>
    </div>
    
    <div class="hints">
        <p>• <strong>ЛКМ + движение</strong> – вращать книгу вокруг</p>
        <p>• <strong>ПКМ + движение</strong> – перемещать книгу</p>
        <p>• <strong>Колесо мыши</strong> – приблизить/отдалить</p>
        <p>• <strong>Клик на угол страницы</strong> – начать перелистывание</p>
        <p>• <strong>Стрелки ← →</strong> – листать страницы</p>
    </div>
    
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div>Загрузка 3D каталога...</div>
    </div>
    
    <div class="debug" id="debug"></div>

    <!-- Three.js библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    
    <script>
        // КЛАСС 3D КНИГИ
        class Book3D {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                this.book = null;
                this.pages = [];
                this.currentPage = 0;
                this.isTurning = false;
                
                this.init();
            }
            
            init() {
                this.createScene();
                this.createBook();
                this.setupControls();
                this.animate();
                
                document.getElementById('loader').style.display = 'none';
                this.updateUI();
            }
            
            createScene() {
                // 1. Сцена
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a0a1a);
                
                // 2. Камера
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 2, 12);
                
                // 3. Рендерер
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                document.getElementById('container3d').appendChild(this.renderer.domElement);
                
                // 4. Освещение
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                this.scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(10, 15, 10);
                directionalLight.castShadow = true;
                this.scene.add(directionalLight);
                
                // 5. Управление камерой
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.minDistance = 5;
                this.controls.maxDistance = 25;
                this.controls.maxPolarAngle = Math.PI / 2;
                
                // Ресайз окна
                window.addEventListener('resize', () => this.onWindowResize());
            }
            
            createBook() {
                this.book = new THREE.Group();
                this.scene.add(this.book);
                
                const pageWidth = 5;
                const pageHeight = 7;
                const pageThickness = 0.005;
                const totalPages = 16; // 8 разворотов
                
                // Цвета для страниц (красивая палитра)
                const pageColors = [
                    0x2c3e50, 0x3498db, 0x2ecc71, 0xe74c3c, // 0-3
                    0x9b59b6, 0xf1c40f, 0x1abc9c, 0x95a5a6, // 4-7
                    0x34495e, 0x16a085, 0x27ae60, 0x2980b9, // 8-11
                    0x8e44ad, 0xd35400, 0xc0392b, 0x7f8c8d  // 12-15
                ];
                
                // Геометрия страницы
                const pageGeometry = new THREE.PlaneGeometry(pageWidth, pageHeight);
                
                // Создаем страницы
                for (let i = 0; i < totalPages; i++) {
                    const isRightPage = i % 2 === 0; // Четные - правые страницы
                    const isCover = i === 0 || i === totalPages - 1;
                    
                    // Передняя сторона страницы
                    const frontMaterial = new THREE.MeshStandardMaterial({
                        color: pageColors[i],
                        roughness: 0.6,
                        metalness: 0.1,
                        side: THREE.FrontSide
                    });
                    
                    // Задняя сторона (серая)
                    const backMaterial = new THREE.MeshStandardMaterial({
                        color: isCover ? 0x333333 : 0xf5f5f5,
                        roughness: 0.8,
                        metalness: 0.05,
                        side: THREE.BackSide
                    });
                    
                    // Создаем меш с двумя материалами
                    const pageMesh = new THREE.Mesh(pageGeometry, [backMaterial, frontMaterial]);
                    pageMesh.castShadow = true;
                    pageMesh.receiveShadow = true;
                    
                    // Создаем группу для страницы
                    const pageGroup = new THREE.Group();
                    
                    // Настраиваем позицию и поворот
                    if (i === 0) {
                        // Передняя обложка (правая)
                        pageGroup.rotation.y = Math.PI / 2;
                        pageGroup.position.x = pageWidth / 2;
                    } else if (i === totalPages - 1) {
                        // Задняя обложка (левая)
                        pageGroup.rotation.y = -Math.PI / 2;
                        pageGroup.position.x = -pageWidth / 2;
                    } else {
                        // Обычные страницы
                        const rotation = isRightPage ? Math.PI / 2 : -Math.PI / 2;
                        const positionX = isRightPage ? pageWidth / 2 : -pageWidth / 2;
                        
                        pageGroup.rotation.y = rotation;
                        pageGroup.position.x = positionX;
                    }
                    
                    // Толщина книги
                    pageGroup.position.z = -i * pageThickness;
                    
                    pageGroup.add(pageMesh);
                    this.book.add(pageGroup);
                    
                    // Сохраняем данные страницы
                    this.pages.push({
                        group: pageGroup,
                        mesh: pageMesh,
                        index: i,
                        isRightPage: isRightPage,
                        isCover: isCover,
                        isFlipped: pageGroup.rotation.y > 0 ? false : true
                    });
                    
                    // Добавляем текст на страницы (создаем текстуру)
                    this.addTextToPage(i, pageMesh, pageColors[i]);
                }
                
                console.log(`Создано ${this.pages.length} страниц`);
            }
            
            addTextToPage(pageIndex, pageMesh, color) {
                // Создаем canvas для текста
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                
                // Заполняем цветом
                const hexColor = '#' + color.toString(16).padStart(6, '0');
                ctx.fillStyle = hexColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Добавляем текст
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (pageIndex === 0) {
                    ctx.fillText('SMART-AV', canvas.width/2, canvas.height/2 - 40);
                    ctx.font = '24px Arial';
                    ctx.fillText('Каталог 2024', canvas.width/2, canvas.height/2 + 20);
                } else if (pageIndex === 15) {
                    ctx.fillText('КОНЕЦ', canvas.width/2, canvas.height/2);
                } else {
                    ctx.fillText(`Страница ${pageIndex}`, canvas.width/2, canvas.height/2);
                }
                
                // Добавляем номер в углу
                ctx.font = '18px Arial';
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'bottom';
                ctx.fillText(`${pageIndex}`, canvas.width - 20, canvas.height - 20);
                
                // Создаем текстуру из canvas
                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;
                
                // Обновляем материал страницы
                pageMesh.material[1].map = texture;
                pageMesh.material[1].needsUpdate = true;
            }
            
            setupControls() {
                // Кнопки
                document.getElementById('prev-btn').addEventListener('click', () => this.turnPage(-1));
                document.getElementById('next-btn').addEventListener('click', () => this.turnPage(1));
                document.getElementById('reset-btn').addEventListener('click', () => this.resetBook());
                document.getElementById('fullscreen-btn').addEventListener('click', () => this.toggleFullscreen());
                
                // Клик по странице
                this.renderer.domElement.addEventListener('click', (e) => this.onPageClick(e));
                
                // Клавиатура
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.turnPage(-1);
                    if (e.key === 'ArrowRight') this.turnPage(1);
                    if (e.key === ' ') this.resetBook();
                    if (e.key === 'f' || e.key === 'F') this.toggleFullscreen();
                    if (e.key === 'r' || e.key === 'R') this.rotateBook();
                });
            }
            
            turnPage(direction) {
                if (this.isTurning) return;
                
                let pageToTurn = null;
                
                if (direction > 0) {
                    // Листаем вперед
                    for (let i = this.currentPage; i < this.pages.length - 1; i++) {
                        const page = this.pages[i];
                        if (!page.isCover && page.isRightPage && !page.isFlipped) {
                            pageToTurn = page;
                            break;
                        }
                    }
                } else {
                    // Листаем назад
                    for (let i = this.currentPage; i > 0; i--) {
                        const page = this.pages[i];
                        if (!page.isCover && !page.isRightPage && page.isFlipped) {
                            pageToTurn = page;
                            break;
                        }
                    }
                }
                
                if (pageToTurn) {
                    this.animatePageTurn(pageToTurn, direction);
                }
            }
            
            animatePageTurn(page, direction) {
                this.isTurning = true;
                
                const startRotation = page.group.rotation.y;
                const targetRotation = direction > 0 ? -Math.PI / 2 : Math.PI / 2;
                const startTime = Date.now();
                const duration = 1200;
                
                // Звук перелистывания
                this.playFlipSound();
                
                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // Плавная анимация
                    const easeProgress = this.easeOutCubic(progress);
                    page.group.rotation.y = startRotation + (targetRotation - startRotation) * easeProgress;
                    
                    // Эффект изгиба страницы
                    const bend = Math.sin(progress * Math.PI) * 0.4;
                    page.group.rotation.z = bend * (direction > 0 ? 1 : -1);
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // Завершение анимации
                        page.group.rotation.z = 0;
                        page.isFlipped = !page.isFlipped;
                        this.isTurning = false;
                        
                        // Обновляем текущую страницу
                        if (direction > 0) {
                            this.currentPage = page.index + 1;
                        } else {
                            this.currentPage = page.index - 1;
                        }
                        
                        this.currentPage = Math.max(0, Math.min(this.pages.length - 1, this.currentPage));
                        this.updateUI();
                    }
                };
                
                animate();
            }
            
            easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }
            
            onPageClick(e) {
                // Получаем координаты клика
                const rect = this.renderer.domElement.getBoundingClientRect();
                const mouse = new THREE.Vector2();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                
                // Проверяем клик по странице
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, this.camera);
                const intersects = raycaster.intersectObjects(this.pages.map(p => p.mesh));
                
                if (intersects.length > 0) {
                    const clickedPage = this.pages.find(p => p.mesh === intersects[0].object);
                    
                    if (clickedPage && !clickedPage.isCover && !this.isTurning) {
                        // Определяем сторону клика
                        const point = intersects[0].point;
                        const pageCenter = clickedPage.group.position;
                        
                        if (point.x > pageCenter.x) {
                            this.turnPage(1); // Клик на правую сторону
                        } else {
                            this.turnPage(-1); // Клик на левую сторону
                        }
                    }
                }
            }
            
            resetBook() {
                // Возвращаем все страницы в исходное положение
                this.pages.forEach(page => {
                    if (!page.isCover) {
                        const targetRotation = page.isRightPage ? Math.PI / 2 : -Math.PI / 2;
                        page.group.rotation.y = targetRotation;
                        page.isFlipped = page.isRightPage ? false : true;
                    }
                });
                
                this.currentPage = 0;
                this.updateUI();
                
                // Звук закрытия книги
                this.playFlipSound();
            }
            
            rotateBook() {
                // Анимация вращения книги
                const startRotation = this.book.rotation.y;
                const targetRotation = startRotation + Math.PI * 2;
                const startTime = Date.now();
                const duration = 2000;
                
                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    const easeProgress = this.easeOutCubic(progress);
                    this.book.rotation.y = startRotation + (targetRotation - startRotation) * easeProgress;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };
                
                animate();
            }
            
            playFlipSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 100 + Math.random() * 50;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.03, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                } catch (e) {
                    // Игнорируем ошибки аудио
                }
            }
            
            toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.getElementById('fullscreen-btn').textContent = '✕';
                } else {
                    document.exitFullscreen();
                    document.getElementById('fullscreen-btn').textContent = '⛶';
                }
            }
            
            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            updateUI() {
                // Обновляем отображение текущей страницы
                const displayPage = Math.floor(this.currentPage / 2) + 1;
                const totalDisplayPages = Math.floor((this.pages.length - 1) / 2);
                
                document.getElementById('current-page').textContent = displayPage;
                document.getElementById('total-pages').textContent = totalDisplayPages;
                
                // Обновляем состояние кнопок
                document.getElementById('prev-btn').disabled = this.currentPage <= 0;
                document.getElementById('next-btn').disabled = this.currentPage >= this.pages.length - 1;
                
                // Отладочная информация
                document.getElementById('debug').textContent = 
                    `3D Книга | Страниц: ${this.pages.length} | Текущая: ${this.currentPage}`;
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                if (this.controls) {
                    this.controls.update();
                }
                
                // Легкое вращение книги если ничего не делаем
                if (!this.isTurning && Math.random() < 0.01) {
                    this.book.rotation.y += 0.001;
                }
                
                this.renderer.render(this.scene, this.camera);
            }
        }
        
        // ЗАПУСК ПРИЛОЖЕНИЯ
        window.addEventListener('load', () => {
            console.log('Запуск 3D книги...');
            const book3d = new Book3D();
            window.book3d = book3d;
        });
        
        // Обработка полноэкранного режима
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('fullscreen-btn').textContent = '⛶';
            }
        });
    </script>
</body>
</html>
