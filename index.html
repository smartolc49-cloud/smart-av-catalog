<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест изображений</title>
    <style>
        body { padding: 20px; }
        .image-check { margin: 10px; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h2>Проверка доступности изображений</h2>
    <div id="results"></div>
    
    <script>
        const images = [
            'SMART-AV_company0.jpg', 'SMART-AV_company1.jpg', 
            'SMART-AV_company2.jpg', 'SMART-AV_company3.jpg',
            'SMART-AV_company4.jpg', 'SMART-AV_company5.jpg',
            'SMART-AV_company6.jpg', 'SMART-AV_company7.jpg',
            'SMART-AV_company8.jpg', 'SMART-AV_company9.jpg',
            'SMART-AV_company10.jpg', 'SMART-AV_company11.jpg',
            'SMART-AV_company12.jpg', 'SMART-AV_company13.jpg',
            'SMART-AV_company14.jpg', 'SMART-AV_company15.jpg'
        ];
        
        images.forEach(img => {
            const testImg = new Image();
            const div = document.createElement('div');
            div.className = 'image-check';
            div.innerHTML = `<strong>${img}:</strong> <span>Проверка...</span>`;
            
            testImg.onload = () => {
                div.className += ' success';
                div.querySelector('span').textContent = '✓ Найдено';
            };
            
            testImg.onerror = () => {
                div.className += ' error';
                div.querySelector('span').textContent = '✗ Не найдено';
                div.innerHTML += `<br><small>Путь: ./images/${img}</small>`;
            };
            
            testImg.src = `./images/${img}`;
            document.getElementById('results').appendChild(div);
        });
    </script>
</body>
</html>
