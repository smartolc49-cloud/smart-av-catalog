<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV | Реалистичный 3D Каталог</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        
        /* UI ЭЛЕМЕНТЫ */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .header {
            position: absolute; top: 30px; width: 100%; text-align: center;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .logo { font-size: 36px; font-weight: 800; letter-spacing: 2px; }
        .logo span { color: #00d2ff; }
        .subtitle { color: #8899ac; font-size: 14px; margin-top: 5px; }

        .controls {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            pointer-events: auto;
        }
        
        .btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .btn:hover { background: #00d2ff; color: #000; box-shadow: 0 0 20px rgba(0,210,255,0.4); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; background: transparent; box-shadow: none; }

        .loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #333;
            border-top: 3px solid #00d2ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #container3d { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Генерация геометрии...</p>
    </div>

    <div class="ui-layer">
        <div class="header">
            <div class="logo">SMART<span>AV</span></div>
            <div class="subtitle">Интерактивный каталог v2.0</div>
        </div>
        
        <div class="controls">
            <button class="btn" id="prev">Назад</button>
            <button class="btn" id="next">Вперед</button>
        </div>
    </div>

    <div id="container3d"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>

    <script>
        class RealisticBook {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.bookGroup = null;
                this.pages = [];
                
                // Настройки книги
                this.params = {
                    width: 5,
                    height: 7.2,
                    segments: 32, // ВАЖНО: Количество сегментов для сгибания
                    totalPages: 10,
                    duration: 1.5 // Секунды на перелистывание
                };

                this.state = {
                    currentPage: 0,
                    isAnimating: false
                };

                this.init();
            }

            init() {
                // 1. Инициализация сцены
                this.scene = new THREE.Scene();
                // Красивый туман для глубины
                this.scene.fog = new THREE.FogExp2(0x0a0a10, 0.02);

                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
                this.camera.position.set(0, 5, 14);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.outputEncoding = THREE.sRGBEncoding;
                document.getElementById('container3d').appendChild(this.renderer.domElement);

                // 2. Свет
                const ambient = new THREE.AmbientLight(0xffffff, 0.4);
                this.scene.add(ambient);

                const spotLight = new THREE.SpotLight(0xffffff, 1);
                spotLight.position.set(5, 15, 10);
                spotLight.angle = 0.5;
                spotLight.penumbra = 0.5;
                spotLight.castShadow = true;
                spotLight.shadow.bias = -0.0001;
                this.scene.add(spotLight);

                // 3. Создание книги
                this.createBook();

                // 4. Контролы камеры
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enablePan = false;
                this.controls.maxPolarAngle = Math.PI / 2; // Не давать смотреть снизу
                this.controls.minDistance = 8;
                this.controls.maxDistance = 20;

                // 5. События
                this.bindEvents();
                this.animate();

                // Убираем лоадер
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = 0;
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                }, 1000);
            }

            createBook() {
                this.bookGroup = new THREE.Group();
                this.scene.add(this.bookGroup);

                // Создаем обложку (чуть больше страниц)
                // Можно добавить отдельно, но для простоты опустим

                // Генерируем страницы
                const geom = new THREE.PlaneGeometry(
                    this.params.width, 
                    this.params.height, 
                    this.params.segments, // X сегменты (нужны для сгиба)
                    2 // Y сегменты
                );

                // Смещаем геометрию так, чтобы ось вращения (pivot) была слева
                geom.translate(this.params.width / 2, 0, 0);

                // Сохраняем "базовую" позицию вершин, чтобы от нее считать деформацию
                const basePositions = new Float32Array(geom.attributes.position.count * 3);
                for(let i=0; i<geom.attributes.position.count; i++){
                    basePositions[i*3] = geom.attributes.position.getX(i);
                    basePositions[i*3+1] = geom.attributes.position.getY(i);
                    basePositions[i*3+2] = geom.attributes.position.getZ(i);
                }
                // Добавляем атрибут в геометрию (кастомный)
                geom.userData.basePositions = basePositions;

                for (let i = 0; i < this.params.totalPages; i++) {
                    const group = new THREE.Group();
                    
                    // Материалы
                    const color = new THREE.Color().setHSL(i * 0.1, 0.5, 0.5);
                    
                    // Текстура с текстом
                    const canvasTexture = this.createPageTexture(i, color);

                    const matFront = new THREE.MeshStandardMaterial({ 
                        map: canvasTexture,
                        roughness: 0.8,
                        metalness: 0.1,
                        side: THREE.FrontSide
                    });

                    const matBack = new THREE.MeshStandardMaterial({ 
                        color: 0xffffff,
                        roughness: 0.9,
                        side: THREE.BackSide
                    });

                    // Клонируем геометрию для каждой страницы, чтобы гнуть их независимо
                    const pageGeom = geom.clone();
                    pageGeom.userData.basePositions = basePositions; // Копируем ссылку на базу

                    const mesh = new THREE.Mesh(pageGeom, [matFront, matBack]);
                    
                    // Для правильного рендеринга двустороннего материала в Three.js с группами
                    // проще сделать два меша или использовать side: DoubleSide, 
                    // но для изгиба лучше использовать один меш с multi-material.
                    // Однако PlaneGeometry имеет только 1 группу граней.
                    // Хак: используем DoubleSide на переднем, но при изгибе это может дать артефакты.
                    // Лучший способ для этого кода:
                    mesh.material = new THREE.MeshStandardMaterial({
                        map: canvasTexture,
                        roughness: 0.6,
                        side: THREE.DoubleSide
                    });
                    
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    mesh.customDepthMaterial = new THREE.MeshDepthMaterial({
                        depthPacking: THREE.RGBADepthPacking
                    });

                    // Z-fighting fix (слои)
                    group.position.z = -i * 0.02; 
                    
                    // Начальная позиция (все страницы справа)
                    group.rotation.y = 0;

                    group.add(mesh);
                    this.bookGroup.add(group);
                    
                    this.pages.push({
                        group: group,
                        mesh: mesh,
                        idx: i,
                        flipped: false
                    });
                }
            }

            // Математика изгиба вершин (Сердце эффекта)
            bendPage(page, angleRotation, direction) {
                const mesh = page.mesh;
                const positions = mesh.geometry.attributes.position;
                const basePositions = mesh.geometry.userData.basePositions;
                
                // Угол от 0 до PI
                const rot = Math.abs(angleRotation);
                
                // Сила изгиба зависит от угла поворота.
                // Максимальный изгиб, когда страница вертикально (PI/2)
                // Math.sin(rot) даст 1.0 в середине пути
                const bendAmount = Math.sin(rot) * 1.5; 

                for (let i = 0; i < positions.count; i++) {
                    const x = basePositions[i * 3];
                    const y = basePositions[i * 3 + 1];
                    const z = basePositions[i * 3 + 2];

                    // Нормализуем X (от 0 у корешка до 1 у края)
                    const normalizedX = x / this.params.width;

                    // Формула деформации
                    // Мы поднимаем Z (на зрителя) тем сильнее, чем ближе к центру перелистывания,
                    // и чем дальше вершина от корешка.
                    // Добавляем нелинейность pow(normalizedX, 2) чтобы гнулся край, а не корешок.
                    
                    const deformationZ = bendAmount * Math.pow(normalizedX, 2) * 2.0;

                    // Применяем
                    positions.setXYZ(i, x, y, z + deformationZ);
                }

                positions.needsUpdate = true;
                
                // Критически важно для света! Пересчитываем нормали, иначе страница будет плоской на вид
                mesh.geometry.computeVertexNormals();
            }

            turnPage(direction) {
                if (this.state.isAnimating) return;

                let targetPageIdx = -1;

                if (direction > 0) { // Вперед
                    if (this.state.currentPage < this.pages.length) {
                        targetPageIdx = this.state.currentPage;
                    }
                } else { // Назад
                    if (this.state.currentPage > 0) {
                        targetPageIdx = this.state.currentPage - 1;
                    }
                }

                if (targetPageIdx === -1) return;

                this.state.isAnimating = true;
                const page = this.pages[targetPageIdx];
                
                // Определяем целевой угол
                const startRot = page.group.rotation.y;
                const endRot = direction > 0 ? -Math.PI + 0.05 : 0; // Небольшой зазор 0.05 чтобы не мерцало
                
                // Анимация
                const startTime = Date.now();
                const duration = 1200; // мс

                const animateTurn = () => {
                    const now = Date.now();
                    let progress = (now - startTime) / duration;
                    
                    if (progress > 1) progress = 1;

                    // Easing (плавность)
                    const ease = 1 - Math.pow(1 - progress, 3); // Cubic out

                    // 1. Вращаем группу
                    const currentRot = startRot + (endRot - startRot) * ease;
                    page.group.rotation.y = currentRot;

                    // 2. Гнем геометрию
                    // Передаем угол относительно "плоского" состояния
                    // Если листаем вперед: 0 -> -PI. Середина -PI/2.
                    // Нам нужна дельта от начала движения
                    this.bendPage(page, currentRot + (direction > 0 ? 0 : Math.PI), direction);

                    if (progress < 1) {
                        requestAnimationFrame(animateTurn);
                    } else {
                        // Конец анимации
                        this.state.isAnimating = false;
                        if (direction > 0) {
                            this.state.currentPage++;
                            // Чуть "распрямить" в конце, чтобы убрать остаточную деформацию
                            this.bendPage(page, 0, direction); 
                        } else {
                            this.state.currentPage--;
                            this.bendPage(page, 0, direction);
                        }
                        this.updateUI();
                    }
                };
                
                animateTurn();
            }

            createPageTexture(index, colorObj) {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 740;
                const ctx = canvas.getContext('2d');

                // Фон
                ctx.fillStyle = index === 0 ? '#111' : '#f5f5f5';
                ctx.fillRect(0,0,512,740);

                // Рамка/Градиент корешка
                const grad = ctx.createLinearGradient(0,0,30,0);
                grad.addColorStop(0, 'rgba(0,0,0,0.2)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0,0,50,740);

                // Текст
                ctx.textAlign = 'center';
                if (index === 0) {
                    ctx.fillStyle = '#00d2ff';
                    ctx.font = 'bold 60px Arial';
                    ctx.fillText('SMART-AV', 256, 300);
                    ctx.fillStyle = '#fff';
                    ctx.font = '30px Arial';
                    ctx.fillText('Collection 2024', 256, 350);
                } else {
                    ctx.fillStyle = '#333';
                    ctx.font = 'bold 140px Arial';
                    ctx.globalAlpha = 0.1;
                    ctx.fillText((index + 1).toString(), 256, 400);
                    ctx.globalAlpha = 1.0;
                    
                    ctx.font = '24px Arial';
                    ctx.fillText(`Продукт #${index+1}`, 256, 100);
                    
                    // Имитация текста
                    ctx.fillStyle = '#666';
                    for(let i=0; i<10; i++) {
                        ctx.fillRect(60, 150 + i*40, 392, 10);
                    }
                    
                    // Картинка (квадрат)
                    ctx.fillStyle = '#' + colorObj.getHexString();
                    ctx.fillRect(60, 550, 392, 150);
                }

                // Номер страницы
                ctx.font = '16px Arial';
                ctx.fillStyle = '#999';
                ctx.fillText(index + 1, 480, 720);

                return new THREE.CanvasTexture(canvas);
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                document.getElementById('next').addEventListener('click', () => this.turnPage(1));
                document.getElementById('prev').addEventListener('click', () => this.turnPage(-1));
                
                // Стрелки клавиатуры
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight') this.turnPage(1);
                    if (e.key === 'ArrowLeft') this.turnPage(-1);
                });
            }

            updateUI() {
                document.getElementById('prev').disabled = this.state.currentPage === 0;
                document.getElementById('next').disabled = this.state.currentPage === this.pages.length;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // Запуск
        window.addEventListener('load', () => {
            new RealisticBook();
        });
    </script>
</body>
</html>
