<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV | Реалистичный 3D Каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 20px;
            transition: background 0.5s;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body.fullscreen {
            padding: 0;
            background: #000;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
            transition: all 0.3s;
        }
        
        body.fullscreen .header {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 200, 255, 0.4);
            letter-spacing: 0.5px;
        }
        
        .logo span {
            color: #00c8ff;
            text-shadow: 0 0 15px rgba(0, 200, 255, 0.6);
        }
        
        .subtitle {
            color: #a0b0ff;
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .main-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        /* КОНТЕЙНЕР КНИГИ */
        .book-wrapper {
            width: 1000px;
            height: 700px;
            position: relative;
            perspective: 3000px;
            margin-bottom: 20px;
            transition: all 0.5s ease;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            cursor: default;
        }
        
        body.fullscreen .book-wrapper {
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            margin: 0;
            box-shadow: none;
        }
        
        @media (max-width: 1100px) {
            .book-wrapper {
                width: 95vw;
                height: calc(95vw * 0.7);
            }
        }
        
        @media (max-width: 768px) {
            .book-wrapper {
                width: 98vw;
                height: calc(98vw * 0.7);
            }
            .logo { font-size: 36px; }
        }
        
        /* КНИГА */
        #book {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }
        
        /* СТРАНИЦЫ */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            backface-visibility: hidden;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.01s linear;
            will-change: transform;
            cursor: grab;
            transform-origin: left center;
        }
        
        .page.right-page {
            transform-origin: right center;
        }
        
        /* АКТИВНАЯ СТРАНИЦА (которая перелистывается) */
        .page.active {
            cursor: grabbing;
            z-index: 1000 !important;
        }
        
        /* ИЗОБРАЖЕНИЕ */
        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        
        /* ПРОСВЕТ БУМАГИ */
        .page-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* ЭФФЕКТ ПРОСВЕТА ЧЕРЕЗ БУМАГУ */
        .page-paper-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 5%, transparent 95%, rgba(255,255,255,0.03) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.02) 1px, rgba(0,0,0,0.02) 2px);
            pointer-events: none;
            mix-blend-mode: multiply;
            z-index: 2;
        }
        
        /* ОТРАЖЕНИЕ НА ОБОРОТНОЙ СТОРОНЕ */
        .page-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f0f0f0 0%, #f8f8f8 100%);
            transform: rotateY(180deg);
            backface-visibility: visible;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }
        
        .page.show-back .page-back {
            opacity: 0.3;
        }
        
        /* УГОЛОК ДЛЯ ПЕРЕТАСКИВАНИЯ */
        .page-corner {
            position: absolute;
            width: 150px;
            height: 150px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }
        
        /* ПРАВЫЙ ВЕРХНИЙ УГОЛ */
        .page-corner.forward {
            top: 0;
            right: 0;
            background: linear-gradient(225deg, transparent 50%, rgba(0, 200, 255, 0.08) 50%);
        }
        
        .page-corner.forward:hover {
            background: linear-gradient(225deg, transparent 50%, rgba(0, 200, 255, 0.2) 50%);
        }
        
        /* ЛЕВЫЙ ВЕРХНИЙ УГОЛ */
        .page-corner.backward {
            top: 0;
            left: 0;
            background: linear-gradient(135deg, transparent 50%, rgba(0, 200, 255, 0.08) 50%);
        }
        
        .page-corner.backward:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(0, 200, 255, 0.2) 50%);
        }
        
        /* ИНДИКАТОР ПЕРЕТАСКИВАНИЯ */
        .drag-indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 1001;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .drag-indicator.visible {
            opacity: 1;
        }
        
        .drag-arrow {
            position: absolute;
            font-size: 30px;
            color: rgba(0, 200, 255, 0.7);
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.5);
        }
        
        /* НОМЕР СТРАНИЦЫ */
        .page-number {
            position: absolute;
            bottom: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .page-number.right {
            right: 15px;
        }
        
        .page-number.left {
            left: 15px;
        }
        
        /* ЭФФЕКТ ИСКРИВЛЕНИЯ БУМАГИ */
        .page-curvature {
            position: absolute;
            top: 0;
            width: 20px;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .page.curved .page-curvature {
            opacity: 0.15;
        }
        
        .page-curvature.left {
            left: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.1), transparent);
        }
        
        .page-curvature.right {
            right: 0;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1));
        }
        
        /* ЭФФЕКТ ТЕНИ ПРИ ПЕРЕЛИСТЫВАНИИ */
        .page-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, 
                rgba(0,0,0,0) 0%,
                rgba(0,0,0,0.05) 30%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.05) 70%,
                rgba(0,0,0,0) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            filter: blur(5px);
        }
        
        .page.turning .page-shadow {
            opacity: 1;
        }
        
        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px 0;
            padding: 15px 30px;
            background: rgba(0, 15, 30, 0.8);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.3);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
            position: relative;
            z-index: 1000;
        }
        
        body.fullscreen .control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            padding: 12px 25px;
            background: rgba(0, 0, 0, 0.85);
        }
        
        /* БОЛЬШИЕ КНОПКИ */
        .big-btn {
            padding: 16px 45px !important;
            font-size: 20px !important;
            min-width: 170px !important;
            height: 65px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 12px !important;
        }
        
        .control-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #00c8ff, #0088dd);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0, 200, 255, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .control-btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 12px 30px rgba(0, 200, 255, 0.6);
        }
        
        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 12px rgba(0, 200, 255, 0.2);
        }
        
        /* ИНФОРМАЦИЯ О СТРАНИЦЕ */
        .page-info {
            font-size: 24px;
            color: #00c8ff;
            font-weight: 700;
            min-width: 140px;
            text-align: center;
            text-shadow: 0 1px 8px rgba(0, 200, 255, 0.3);
            padding: 0 20px;
        }
        
        .page-info span {
            color: white;
            font-size: 28px;
        }
        
        /* КНОПКА ПОЛНОГО ЭКРАНА */
        .fullscreen-btn {
            position: absolute !important;
            top: 15px;
            right: 15px;
            width: 55px !important;
            height: 55px !important;
            min-width: auto !important;
            padding: 0 !important;
            border-radius: 50% !important;
            background: rgba(0, 200, 255, 0.15) !important;
            border: 2px solid rgba(0, 200, 255, 0.4) !important;
            z-index: 1001;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 24px !important;
        }
        
        .fullscreen-btn:hover {
            background: rgba(0, 200, 255, 0.3) !important;
            transform: scale(1.1);
        }
        
        /* БЫСТРАЯ НАВИГАЦИЯ */
        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
            max-width: 800px;
        }
        
        .quick-btn {
            padding: 10px 20px;
            background: rgba(0, 200, 255, 0.12);
            border: 1px solid rgba(0, 200, 255, 0.3);
            color: #00c8ff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            min-width: 45px;
            text-align: center;
        }
        
        .quick-btn:hover {
            background: rgba(0, 200, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 200, 255, 0.3);
        }
        
        .quick-btn.active {
            background: #00c8ff;
            color: #0a0a1a;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
        }
        
        /* СТАТУС */
        .status {
            padding: 15px 30px;
            border-radius: 12px;
            margin: 15px auto;
            text-align: center;
            max-width: 500px;
            display: none;
        }
        
        .loading {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.1), rgba(0, 80, 200, 0.1));
            color: #00c8ff;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        
        .success {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.1), rgba(0, 180, 80, 0.1));
            color: #00ff80;
            border: 1px solid rgba(0, 255, 100, 0.3);
        }
        
        .error {
            background: linear-gradient(135deg, rgba(255, 50, 50, 0.1), rgba(180, 0, 0, 0.1));
            color: #ff5050;
            border: 1px solid rgba(255, 50, 50, 0.3);
        }
        
        /* АНИМАЦИИ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        
        @keyframes paperGlow {
            0%, 100% { opacity: 0.05; }
            50% { opacity: 0.15; }
        }
        
        /* ПОДСКАЗКА */
        .hint {
            color: #8899cc;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            line-height: 1.5;
            max-width: 700px;
        }
    </style>
</head>
<body>
    <div class="header fade-in">
        <div class="logo">SMART<span>AV</span></div>
        <p class="subtitle">Реалистичный бумажный каталог с естественным перелистыванием</p>
    </div>
    
    <div class="main-container">
        <button id="fullscreen-toggle" class="control-btn fullscreen-btn" title="Полный экран">
            <span id="fullscreen-icon">⛶</span>
        </button>
        
        <div class="book-wrapper">
            <div id="book"></div>
        </div>
        
        <div id="status" class="status loading fade-in">
            Подготовка реалистичного перелистывания...
        </div>
        
        <div class="control-panel fade-in">
            <button id="prev-btn" class="control-btn big-btn" disabled>
                <span style="font-size: 26px;">◀</span> НАЗАД
            </button>
            
            <div class="page-info">
                <span id="current-page">1</span> / <span id="total-pages">16</span>
            </div>
            
            <button id="next-btn" class="control-btn big-btn" disabled>
                ВПЕРЕД <span style="font-size: 26px;">▶</span>
            </button>
        </div>
        
        <div class="quick-nav" id="quick-nav"></div>
        
        <div class="hint fade-in">
            <p>• Захватите уголок страницы и потяните для реалистичного перелистывания</p>
            <p>• Страница следует точно за курсором с эффектом тонкой бумаги</p>
            <p>• Нажмите ⛶ для полноэкранного режима</p>
        </div>
    </div>

    <script>
        // РЕАЛИСТИЧНЫЙ КЛАСС КНИГИ С БУМАЖНОЙ ФИЗИКОЙ
        class PaperBook {
            constructor(containerId, pages) {
                this.container = document.getElementById(containerId);
                this.pages = pages;
                this.currentPage = 1;
                this.isTurning = false;
                this.isDragging = false;
                this.dragStart = { x: 0, y: 0 };
                this.dragCurrent = { x: 0, y: 0 };
                this.activePage = null;
                this.dragDirection = 0;
                this.pageElements = [];
                this.isFullscreen = false;
                this.animationFrame = null;
                this.dragIndicator = null;
                
                this.init();
            }
            
            async init() {
                await this.loadImages();
                this.createBookStructure();
                this.setupEventListeners();
                this.createQuickNavigation();
                this.showCurrentPage();
                this.updateControls();
                
                this.showStatus('success', '✓ Готово! Перетащите уголок страницы.');
            }
            
            async loadImages() {
                const status = document.getElementById('status');
                status.style.display = 'block';
                
                const promises = this.pages.map((filename, index) => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            resolve({ index, img, loaded: true });
                            const percent = Math.round(((index + 1) / this.pages.length) * 100);
                            status.textContent = `Загрузка изображений: ${percent}%`;
                        };
                        img.onerror = () => {
                            // Создаем заглушку
                            const canvas = document.createElement('canvas');
                            canvas.width = 1000;
                            canvas.height = 700;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#f8f8f8';
                            ctx.fillRect(0, 0, 1000, 700);
                            ctx.fillStyle = '#666';
                            ctx.font = 'bold 40px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText(`Страница ${index + 1}`, 500, 350);
                            ctx.font = '20px Arial';
                            ctx.fillText('SMART-AV', 500, 400);
                            img.src = canvas.toDataURL();
                            resolve({ index, img, loaded: false });
                        };
                        img.src = `images/${filename}`;
                        img.loading = "lazy";
                    });
                });
                
                await Promise.all(promises);
            }
            
            createBookStructure() {
                this.container.innerHTML = '';
                this.pageElements = [];
                
                // Создаем индикатор перетаскивания
                this.dragIndicator = document.createElement('div');
                this.dragIndicator.className = 'drag-indicator';
                const arrow = document.createElement('div');
                arrow.className = 'drag-arrow';
                arrow.textContent = '➤';
                this.dragIndicator.appendChild(arrow);
                this.container.appendChild(this.dragIndicator);
                
                // Создаем все страницы
                for (let i = 0; i < this.pages.length; i++) {
                    const pageNum = i + 1;
                    const isRightPage = pageNum % 2 === 0;
                    
                    const page = document.createElement('div');
                    page.className = `page ${isRightPage ? 'right-page' : ''}`;
                    page.dataset.page = pageNum;
                    page.dataset.side = isRightPage ? 'right' : 'left';
                    
                    const content = document.createElement('div');
                    content.className = 'page-content';
                    
                    const img = document.createElement('img');
                    img.className = 'page-image';
                    img.src = `images/${this.pages[i]}`;
                    img.alt = `Страница ${pageNum}`;
                    
                    // Эффект бумаги
                    const paperEffect = document.createElement('div');
                    paperEffect.className = 'page-paper-effect';
                    
                    // Обратная сторона
                    const backSide = document.createElement('div');
                    backSide.className = 'page-back';
                    
                    // Уголок для перелистывания
                    const corner = document.createElement('div');
                    corner.className = `page-corner ${isRightPage ? 'forward' : 'backward'}`;
                    corner.title = 'Потяните для перелистывания';
                    
                    // Эффект кривизны
                    const curvatureLeft = document.createElement('div');
                    curvatureLeft.className = 'page-curvature left';
                    
                    const curvatureRight = document.createElement('div');
                    curvatureRight.className = 'page-curvature right';
                    
                    // Тень при перелистывании
                    const shadow = document.createElement('div');
                    shadow.className = 'page-shadow';
                    
                    // Номер страницы
                    const number = document.createElement('div');
                    number.className = `page-number ${isRightPage ? 'right' : 'left'}`;
                    number.textContent = pageNum;
                    
                    content.appendChild(img);
                    content.appendChild(paperEffect);
                    content.appendChild(backSide);
                    
                    page.appendChild(content);
                    page.appendChild(corner);
                    page.appendChild(curvatureLeft);
                    page.appendChild(curvatureRight);
                    page.appendChild(shadow);
                    page.appendChild(number);
                    
                    this.container.appendChild(page);
                    this.pageElements.push(page);
                    
                    // Начальная позиция
                    this.resetPagePosition(page);
                }
            }
            
            resetPagePosition(page) {
                const pageNum = parseInt(page.dataset.page);
                const isRightPage = page.dataset.side === 'right';
                
                // Начальное положение
                if (pageNum === 1) {
                    // Первая страница
                    page.style.left = '0';
                    page.style.width = '100%';
                    page.style.transform = 'translateX(0) rotateY(0deg)';
                    page.style.opacity = '1';
                    page.style.zIndex = '10';
                } else if (isRightPage) {
                    // Правая страница разворота
                    page.style.left = '50%';
                    page.style.width = '50%';
                    page.style.transform = 'translateX(0) rotateY(0deg)';
                    page.style.opacity = '1';
                    page.style.zIndex = '5';
                    page.classList.add('curved');
                } else {
                    // Левая страница разворота
                    page.style.left = '0';
                    page.style.width = '50%';
                    page.style.transform = 'translateX(0) rotateY(0deg)';
                    page.style.opacity = '1';
                    page.style.zIndex = '5';
                    page.classList.add('curved');
                }
                
                page.classList.remove('show-back');
            }
            
            setupEventListeners() {
                document.getElementById('prev-btn').addEventListener('click', () => this.turnPage(-1));
                document.getElementById('next-btn').addEventListener('click', () => this.turnPage(1));
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.turnPage(-1);
                    if (e.key === 'ArrowRight') this.turnPage(1);
                    if (e.key === 'f' || e.key === 'F') this.toggleFullscreen();
                    if (e.key === 'Escape' && this.isFullscreen) this.toggleFullscreen();
                });
                
                document.getElementById('fullscreen-toggle').addEventListener('click', () => this.toggleFullscreen());
                
                this.setupDragEvents();
            }
            
            setupDragEvents() {
                this.pageElements.forEach(page => {
                    const corner = page.querySelector('.page-corner');
                    const pageNum = parseInt(page.dataset.page);
                    const isRightPage = page.dataset.side === 'right';
                    
                    corner.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        this.startDrag(e, page, isRightPage ? 1 : -1);
                    });
                    
                    corner.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        this.startDrag(e, page, isRightPage ? 1 : -1);
                    });
                    
                    corner.addEventListener('dblclick', (e) => {
                        e.preventDefault();
                        if (isRightPage && pageNum === this.currentPage + 1) {
                            this.turnPage(1);
                        } else if (!isRightPage && pageNum === this.currentPage) {
                            this.turnPage(-1);
                        }
                    });
                });
                
                document.addEventListener('mousemove', (e) => this.handleDrag(e));
                document.addEventListener('touchmove', (e) => this.handleDrag(e));
                document.addEventListener('mouseup', () => this.endDrag());
                document.addEventListener('touchend', () => this.endDrag());
                document.addEventListener('mouseleave', () => {
                    if (this.isDragging) this.endDrag();
                });
            }
            
            startDrag(e, page, direction) {
                if (this.isTurning || this.isDragging) return;
                
                this.isDragging = true;
                this.activePage = page;
                this.dragDirection = direction;
                
                const clientX = e.clientX || e.touches[0].clientX;
                const clientY = e.clientY || e.touches[0].clientY;
                
                this.dragStart.x = clientX;
                this.dragStart.y = clientY;
                this.dragCurrent.x = clientX;
                this.dragCurrent.y = clientY;
                
                page.classList.add('active', 'turning', 'show-back');
                page.style.transition = 'none';
                page.style.zIndex = '1000';
                
                // Показываем индикатор
                this.dragIndicator.style.left = clientX - 30 + 'px';
                this.dragIndicator.style.top = clientY - 30 + 'px';
                this.dragIndicator.classList.add('visible');
                
                // Поворачиваем стрелку
                const arrow = this.dragIndicator.querySelector('.drag-arrow');
                arrow.style.transform = direction === 1 ? 'rotate(180deg)' : 'rotate(0deg)';
                arrow.style.left = direction === 1 ? '10px' : '20px';
                
                this.animateDrag();
            }
            
            handleDrag(e) {
                if (!this.isDragging || !this.activePage) return;
                
                e.preventDefault();
                
                const clientX = e.clientX || e.touches[0].clientX;
                const clientY = e.clientY || e.touches[0].clientY;
                
                this.dragCurrent.x = clientX;
                this.dragCurrent.y = clientY;
                
                // Обновляем позицию индикатора
                if (this.dragIndicator) {
                    this.dragIndicator.style.left = clientX - 30 + 'px';
                    this.dragIndicator.style.top = clientY - 30 + 'px';
                }
            }
            
            animateDrag() {
                if (!this.isDragging || !this.activePage) {
                    if (this.animationFrame) {
                        cancelAnimationFrame(this.animationFrame);
                        this.animationFrame = null;
                    }
                    return;
                }
                
                const deltaX = this.dragCurrent.x - this.dragStart.x;
                const deltaY = this.dragCurrent.y - this.dragStart.y;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                
                // Реалистичная физика бумаги
                let progress = 0;
                if (this.dragDirection === 1) {
                    // Перелистывание вперед
                    progress = Math.max(0, Math.min(1, -deltaX / 500));
                    
                    // Эффект эластичной бумаги
                    const elastic = Math.sin(progress * Math.PI) * 0.2;
                    const rotation = progress * 180;
                    const bend = Math.sin(progress * Math.PI) * 20 * (1 + elastic);
                    const twist = Math.sin(progress * Math.PI * 2) * 3;
                    
                    this.activePage.style.transform = `
                        translateX(${-progress * 100}%)
                        rotateY(${-rotation}deg)
                        rotateZ(${twist}deg)
                        translateZ(${bend}px)
                    `;
                } else {
                    // Перелистывание назад
                    progress = Math.max(0, Math.min(1, deltaX / 500));
                    
                    const elastic = Math.sin(progress * Math.PI) * 0.2;
                    const rotation = progress * 180;
                    const bend = Math.sin(progress * Math.PI) * 20 * (1 + elastic);
                    const twist = Math.sin(progress * Math.PI * 2) * -3;
                    
                    this.activePage.style.transform = `
                        translateX(${progress * 100}%)
                        rotateY(${rotation}deg)
                        rotateZ(${twist}deg)
                        translateZ(${bend}px)
                    `;
                }
                
                // Эффект тени
                const shadow = this.activePage.querySelector('.page-shadow');
                if (shadow) {
                    const intensity = Math.min(0.8, progress * 1.5);
                    shadow.style.opacity = intensity;
                    shadow.style.background = `radial-gradient(circle at ${this.dragDirection === 1 ? '30%' : '70%'} center, 
                        rgba(0,0,0,0) 0%,
                        rgba(0,0,0,${0.05 * intensity}) 30%,
                        rgba(0,0,0,${0.1 * intensity}) 50%,
                        rgba(0,0,0,${0.05 * intensity}) 70%,
                        rgba(0,0,0,0) 100%)`;
                }
                
                // Эффект просвета обратной стороны
                if (progress > 0.3) {
                    this.activePage.classList.add('show-back');
                } else {
                    this.activePage.classList.remove('show-back');
                }
                
                this.animationFrame = requestAnimationFrame(() => this.animateDrag());
            }
            
            endDrag() {
                if (!this.isDragging || !this.activePage) return;
                
                this.isDragging = false;
                
                // Скрываем индикатор
                if (this.dragIndicator) {
                    this.dragIndicator.classList.remove('visible');
                }
                
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                    this.animationFrame = null;
                }
                
                const currentTransform = this.activePage.style.transform;
                const match = currentTransform.match(/rotateY\(([-\d.]+)deg\)/);
                const currentRotation = match ? parseFloat(match[1]) : 0;
                
                // Определяем, нужно ли перелистывать
                const shouldTurn = Math.abs(currentRotation) > 90;
                
                this.activePage.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1)';
                
                if (shouldTurn) {
                    // Завершаем перелистывание с эффектом
                    if (this.dragDirection === 1) {
                        this.activePage.style.transform = 'translateX(-100%) rotateY(-180deg) rotateZ(0deg) translateZ(0px)';
                    } else {
                        this.activePage.style.transform = 'translateX(100%) rotateY(180deg) rotateZ(0deg) translateZ(0px)';
                    }
                    
                    setTimeout(() => {
                        this.turnPage(this.dragDirection);
                        this.activePage.classList.remove('active', 'turning', 'show-back');
                        this.resetPagePosition(this.activePage);
                        this.activePage = null;
                    }, 800);
                } else {
                    // Возвращаем с эффектом пружины
                    this.activePage.style.transform = 'translateX(0) rotateY(0deg) rotateZ(0deg) translateZ(0px)';
                    
                    setTimeout(() => {
                        this.activePage.classList.remove('active', 'turning', 'show-back');
                        this.activePage.style.zIndex = '5';
                        this.activePage = null;
                    }, 800);
                }
            }
            
            async turnPage(direction) {
                if (this.isTurning) return;
                
                const newPage = this.currentPage + direction;
                if (newPage < 1 || newPage > this.pages.length) return;
                
                this.isTurning = true;
                
                // Звук перелистывания
                this.playPaperSound();
                
                // Обновляем текущую страницу
                this.currentPage = newPage;
                this.showCurrentPage();
                this.updateControls();
                
                await new Promise(resolve => setTimeout(resolve, 400));
                this.isTurning = false;
            }
            
            showCurrentPage() {
                // Сначала сбрасываем все страницы
                this.pageElements.forEach(page => {
                    page.style.opacity = '0.3';
                    page.style.pointerEvents = 'none';
                    page.style.zIndex = '1';
                    page.classList.remove('curved');
                });
                
                // Показываем текущую страницу
                const currentPageElem = this.pageElements.find(p => 
                    parseInt(p.dataset.page) === this.currentPage
                );
                
                if (currentPageElem) {
                    currentPageElem.style.opacity = '1';
                    currentPageElem.style.pointerEvents = 'auto';
                    currentPageElem.style.zIndex = '10';
                    
                    // Для страниц 2+ добавляем эффект кривизны
                    if (this.currentPage > 1) {
                        currentPageElem.classList.add('curved');
                    }
                }
                
                // Показываем следующую страницу для разворота
                if (this.currentPage < this.pages.length) {
                    const nextPageElem = this.pageElements.find(p => 
                        parseInt(p.dataset.page) === this.currentPage + 1
                    );
                    
                    if (nextPageElem) {
                        nextPageElem.style.opacity = '1';
                        nextPageElem.style.pointerEvents = 'auto';
                        nextPageElem.style.zIndex = '5';
                        nextPageElem.classList.add('curved');
                    }
                }
                
                // Обновляем активную кнопку быстрой навигации
                document.querySelectorAll('.quick-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (parseInt(btn.dataset.page) === this.currentPage) {
                        btn.classList.add('active');
                    }
                });
            }
            
            updateControls() {
                document.getElementById('current-page').textContent = this.currentPage;
                document.getElementById('total-pages').textContent = this.pages.length;
                
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                
                prevBtn.disabled = this.currentPage <= 1 || this.isTurning || this.isDragging;
                nextBtn.disabled = this.currentPage >= this.pages.length || this.isTurning || this.isDragging;
            }
            
            createQuickNavigation() {
                const quickNav = document.getElementById('quick-nav');
                
                for (let i = 1; i <= this.pages.length; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'quick-btn';
                    btn.textContent = i;
                    btn.dataset.page = i;
                    btn.addEventListener('click', () => this.goToPage(i));
                    quickNav.appendChild(btn);
                }
            }
            
            goToPage(targetPage) {
                if (targetPage < 1 || targetPage > this.pages.length || 
                    this.isTurning || this.isDragging) return;
                
                // Анимированный переход
                const direction = targetPage > this.currentPage ? 1 : -1;
                const steps = Math.abs(targetPage - this.currentPage);
                
                const animateStep = (step) => {
                    if (step >= steps) {
                        this.currentPage = targetPage;
                        this.showCurrentPage();
                        this.updateControls();
                        return;
                    }
                    
                    this.currentPage += direction;
                    this.showCurrentPage();
                    this.updateControls();
                    this.playPaperSound();
                    
                    setTimeout(() => animateStep(step + 1), 200);
                };
                
                animateStep(0);
            }
            
            toggleFullscreen() {
                this.isFullscreen = !this.isFullscreen;
                
                if (this.isFullscreen) {
                    document.body.classList.add('fullscreen');
                    document.getElementById('fullscreen-icon').textContent = '✕';
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen?.();
                    }
                } else {
                    document.body.classList.remove('fullscreen');
                    document.getElementById('fullscreen-icon').textContent = '⛶';
                    if (document.fullscreenElement) {
                        document.exitFullscreen?.();
                    }
                }
            }
            
            playPaperSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const oscillator = audioContext.createOscillator();
                            const gainNode = audioContext.createGain();
                            
                            oscillator.connect(gainNode);
                            gainNode.connect(audioContext.destination);
                            
                            oscillator.frequency.value = 50 + Math.random() * 60;
                            oscillator.type = 'triangle';
                            
                            gainNode.gain.setValueAtTime(0.02, audioContext.currentTime);
                            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
                            
                            oscillator.start(audioContext.currentTime);
                            oscillator.stop(audioContext.currentTime + 0.3);
                        }, i * 25);
                    }
                } catch (e) {
                    // Игнорируем ошибки аудио
                }
            }
            
            showStatus(type, message) {
                const status = document.getElementById('status');
                status.className = `status ${type} fade-in`;
                status.textContent = message;
                status.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        status.style.opacity = '0';
                        setTimeout(() => {
                            status.style.display = 'none';
                        }, 500);
                    }, 2000);
                }
            }
        }
        
        // ЗАПУСК КНИГИ
        window.addEventListener('load', async () => {
            const imageFiles = [
                'SMART-AV_company0.jpg',
                'SMART-AV_company1.jpg',
                'SMART-AV_company2.jpg',
                'SMART-AV_company3.jpg',
                'SMART-AV_company4.jpg',
                'SMART-AV_company5.jpg',
                'SMART-AV_company6.jpg',
                'SMART-AV_company7.jpg',
                'SMART-AV_company8.jpg',
                'SMART-AV_company9.jpg',
                'SMART-AV_company10.jpg',
                'SMART-AV_company11.jpg',
                'SMART-AV_company12.jpg',
                'SMART-AV_company13.jpg',
                'SMART-AV_company14.jpg',
                'SMART-AV_company15.jpg'
            ];
            
            try {
                window.book = new PaperBook('book', imageFiles);
            } catch (error) {
                const status = document.getElementById('status');
                status.className = 'status error fade-in';
                status.textContent = `Ошибка: ${error.message}`;
                status.style.display = 'block';
            }
        });
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen');
                document.getElementById('fullscreen-icon').textContent = '⛶';
                if (window.book) window.book.isFullscreen = false;
            }
        });
        
        document.addEventListener('selectstart', (e) => {
            if (window.book?.isDragging) {
                e.preventDefault();
            }
        });
    </script>
