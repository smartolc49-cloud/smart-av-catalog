<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV | 3D Каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .logo span {
            color: #00d4ff;
        }
        
        .subtitle {
            color: #a0a0ff;
            font-size: 18px;
            opacity: 0.9;
        }
        
        /* КОНТЕЙНЕР КНИГИ */
        .book-container {
            width: 900px;
            height: 630px;
            margin: 20px auto 40px;
            position: relative;
            perspective: 2000px;
            transform-style: preserve-3d;
        }
        
        @media (max-width: 1000px) {
            .book-container {
                width: 90vw;
                height: calc(90vw * 0.7);
            }
        }
        
        @media (max-width: 600px) {
            .book-container {
                width: 95vw;
                height: calc(95vw * 0.7);
            }
            .logo { font-size: 36px; }
        }
        
        /* СТРАНИЦЫ */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: white;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.42, 0, 0.58, 1);
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        /* ПРАВАЯ СТРАНИЦА (четные номера) */
        .page.right {
            transform-origin: left center;
        }
        
        /* ЛЕВАЯ СТРАНИЦА (нечетные номера) */
        .page.left {
            transform-origin: right center;
        }
        
        /* ИЗОБРАЖЕНИЕ СТРАНИЦЫ */
        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }
        
        /* УГОЛОК ДЛЯ ПЕРЕТАСКИВАНИЯ */
        .page-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 10;
        }
        
        .page.right .page-corner {
            top: 0;
            right: 0;
            background: linear-gradient(225deg, transparent 50%, rgba(0, 212, 255, 0.15) 50%);
        }
        
        .page.right .page-corner:hover {
            background: linear-gradient(225deg, transparent 50%, rgba(0, 212, 255, 0.3) 50%);
        }
        
        .page.left .page-corner {
            top: 0;
            left: 0;
            background: linear-gradient(135deg, transparent 50%, rgba(0, 212, 255, 0.15) 50%);
        }
        
        .page.left .page-corner:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(0, 212, 255, 0.3) 50%);
        }
        
        /* НОМЕР СТРАНИЦЫ */
        .page-number {
            position: absolute;
            bottom: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .page.right .page-number {
            right: 15px;
        }
        
        .page.left .page-number {
            left: 15px;
        }
        
        /* УПРАВЛЕНИЕ */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #00d4ff, #0088ff);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        
        .control-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.5);
        }
        
        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .page-info {
            font-size: 24px;
            color: #00d4ff;
            font-weight: 700;
            min-width: 140px;
            text-align: center;
        }
        
        .page-info span {
            color: white;
        }
        
        /* ПОДСКАЗКИ */
        .instructions {
            text-align: center;
            color: #a0a0ff;
            font-size: 16px;
            line-height: 1.6;
            margin: 20px 0;
            max-width: 800px;
        }
        
        /* БЫСТРАЯ НАВИГАЦИЯ */
        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            padding: 8px 18px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .quick-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }
        
        /* СТАТУС */
        .status {
            padding: 15px 25px;
            border-radius: 10px;
            margin: 20px auto;
            text-align: center;
            max-width: 500px;
            display: none;
        }
        
        .loading {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-left: 4px solid #00d4ff;
        }
        
        .error {
            background: rgba(255, 50, 50, 0.1);
            color: #ff5050;
            border-left: 4px solid #ff5050;
        }
        
        .success {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
            border-left: 4px solid #00ff64;
        }
        
        /* АНИМАЦИЯ ПОЯВЛЕНИЯ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeInUp 0.6s ease forwards;
        }
    </style>
</head>
<body>
    <div class="header fade-in">
        <div class="logo">SMART<span>AV</span></div>
        <p class="subtitle">Интерактивный 3D каталог</p>
    </div>
    
    <div class="book-container" id="book-container"></div>
    
    <div id="status" class="status loading fade-in">
        Загрузка каталога...
    </div>
    
    <div class="controls fade-in">
        <button id="prev-btn" class="control-btn" disabled>
            <span>◀</span> Назад
        </button>
        
        <div class="page-info">
            <span id="current-page">1</span> из <span id="total-pages">16</span>
        </div>
        
        <button id="next-btn" class="control-btn" disabled>
            Вперед <span>▶</span>
        </button>
    </div>
    
    <div class="instructions fade-in">
        <p>• Перетащите правый верхний угол страницы влево для перелистывания вперед</p>
        <p>• Перетащите левый верхний угол вправо для перелистывания назад</p>
        <p>• Или используйте кнопки управления / клавиши ← →</p>
    </div>
    
    <div class="quick-nav" id="quick-nav"></div>

    <script>
        // ПРОСТОЙ И РАБОЧИЙ FLIPBOOK
        class SimpleBook {
            constructor(containerId, pages) {
                this.container = document.getElementById(containerId);
                this.pages = pages;
                this.currentPage = 1;
                this.isTurning = false;
                this.bookPages = [];
                
                this.init();
            }
            
            async init() {
                await this.loadAllPages();
                this.createBook();
                this.setupControls();
                this.updateDisplay();
                this.showStatus('success', '✓ Каталог загружен!');
            }
            
            async loadAllPages() {
                const status = document.getElementById('status');
                status.style.display = 'block';
                status.textContent = 'Загрузка изображений...';
                
                // Загружаем все изображения
                const promises = this.pages.map((filename, index) => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            resolve({ index, img, filename, loaded: true });
                        };
                        img.onerror = () => {
                            // Создаем заглушку при ошибке
                            const canvas = document.createElement('canvas');
                            canvas.width = 800;
                            canvas.height = 600;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#f0f0f0';
                            ctx.fillRect(0, 0, 800, 600);
                            ctx.fillStyle = '#666';
                            ctx.font = '30px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText(`Страница ${index + 1}`, 400, 300);
                            img.src = canvas.toDataURL();
                            resolve({ index, img, filename, loaded: false });
                        };
                        img.src = `images/${filename}`;
                    });
                });
                
                const results = await Promise.all(promises);
                this.loadedImages = results.sort((a, b) => a.index - b.index);
                
                // Обновляем статус
                const loadedCount = results.filter(r => r.loaded).length;
                status.textContent = `Загружено: ${loadedCount} из ${this.pages.length} страниц`;
            }
            
            createBook() {
                this.container.innerHTML = '';
                this.bookPages = [];
                
                // Создаем все страницы
                for (let i = 0; i < this.loadedImages.length; i++) {
                    const pageData = this.loadedImages[i];
                    const pageNum = i + 1;
                    const isRightPage = pageNum % 2 === 0; // Четные - правые
                    
                    const page = document.createElement('div');
                    page.className = `page ${isRightPage ? 'right' : 'left'}`;
                    page.dataset.page = pageNum;
                    
                    // Изображение
                    const img = document.createElement('img');
                    img.className = 'page-image';
                    img.src = pageData.img.src;
                    img.alt = `Страница ${pageNum}`;
                    
                    // Уголок
                    const corner = document.createElement('div');
                    corner.className = 'page-corner';
                    corner.title = 'Перетащите для перелистывания';
                    
                    // Номер
                    const number = document.createElement('div');
                    number.className = 'page-number';
                    number.textContent = pageNum;
                    
                    page.appendChild(img);
                    page.appendChild(corner);
                    page.appendChild(number);
                    
                    this.container.appendChild(page);
                    this.bookPages.push(page);
                    
                    // Начальное положение
                    if (isRightPage) {
                        // Правая страница: видна если это текущая страница
                        page.style.opacity = pageNum === 2 ? '1' : '0';
                        page.style.transform = 'rotateY(0deg)';
                        page.style.zIndex = pageNum === 2 ? '2' : '1';
                    } else {
                        // Левая страница: видна если это следующая за текущей
                        page.style.opacity = pageNum === 1 ? '1' : '0';
                        page.style.transform = 'rotateY(0deg)';
                        page.style.zIndex = pageNum === 1 ? '2' : '1';
                    }
                    
                    // События для уголка
                    this.setupPageEvents(page, pageNum, isRightPage);
                }
            }
            
            setupPageEvents(page, pageNum, isRightPage) {
                const corner = page.querySelector('.page-corner');
                let isDragging = false;
                let startX = 0;
                
                // Начало перетаскивания
                corner.addEventListener('mousedown', (e) => {
                    if (this.isTurning) return;
                    
                    isDragging = true;
                    startX = e.clientX;
                    page.style.transition = 'none';
                    e.preventDefault();
                });
                
                // Перетаскивание
                document.addEventListener('mousemove', (e) => {
                    if (!isDragging || this.isTurning) return;
                    
                    const deltaX = e.clientX - startX;
                    let angle = 0;
                    
                    if (isRightPage) {
                        // Правая страница: тянем влево
                        angle = Math.max(-180, Math.min(0, deltaX * 0.5));
                        page.style.transform = `rotateY(${angle}deg)`;
                    } else {
                        // Левая страница: тянем вправо
                        angle = Math.min(180, Math.max(0, deltaX * 0.5));
                        page.style.transform = `rotateY(${angle}deg)`;
                    }
                    
                    // Поднимаем страницу при перелистывании
                    page.style.zIndex = Math.abs(angle) > 20 ? '100' : '2';
                });
                
                // Конец перетаскивания
                document.addEventListener('mouseup', () => {
                    if (!isDragging) return;
                    
                    isDragging = false;
                    page.style.transition = 'transform 0.8s cubic-bezier(0.42, 0, 0.58, 1)';
                    
                    const currentTransform = page.style.transform;
                    const currentAngle = parseInt(currentTransform.match(/rotateY\((-?\d+)deg\)/)?.[1] || 0);
                    
                    // Если угол больше 90 градусов - перелистываем
                    if (Math.abs(currentAngle) > 90) {
                        if (isRightPage) {
                            this.turnPage(1); // Вперед
                        } else {
                            this.turnPage(-1); // Назад
                        }
                    } else {
                        // Возвращаем на место
                        page.style.transform = 'rotateY(0deg)';
                        page.style.zIndex = '2';
                    }
                });
                
                // Двойной клик
                corner.addEventListener('dblclick', () => {
                    if (this.isTurning) return;
                    
                    if (isRightPage && pageNum === this.currentPage + 1) {
                        this.turnPage(1);
                    } else if (!isRightPage && pageNum === this.currentPage) {
                        this.turnPage(-1);
                    }
                });
            }
            
            setupControls() {
                // Кнопки
                document.getElementById('prev-btn').addEventListener('click', () => this.turnPage(-1));
                document.getElementById('next-btn').addEventListener('click', () => this.turnPage(1));
                
                // Клавиатура
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.turnPage(-1);
                    if (e.key === 'ArrowRight') this.turnPage(1);
                });
                
                // Быстрая навигация
                this.createQuickNav();
            }
            
            createQuickNav() {
                const quickNav = document.getElementById('quick-nav');
                const importantPages = [1, 3, 5, 8, 11, 13, 16];
                
                importantPages.forEach(pageNum => {
                    const btn = document.createElement('button');
                    btn.className = 'quick-btn';
                    btn.textContent = pageNum;
                    btn.addEventListener('click', () => this.goToPage(pageNum));
                    quickNav.appendChild(btn);
                });
            }
            
            async turnPage(direction) {
                if (this.isTurning) return;
                
                const newPage = this.currentPage + direction;
                if (newPage < 1 || newPage > this.pages.length) return;
                
                this.isTurning = true;
                
                // Находим страницу для анимации
                const pageToTurn = this.bookPages.find(p => {
                    const pageNum = parseInt(p.dataset.page);
                    const isRight = p.classList.contains('right');
                    
                    if (direction === 1) {
                        return isRight && pageNum === newPage;
                    } else {
                        return !isRight && pageNum === this.currentPage;
                    }
                });
                
                if (pageToTurn) {
                    // Анимация перелистывания
                    const targetAngle = direction === 1 ? -180 : 180;
                    
                    // Плавная анимация
                    pageToTurn.style.transform = `rotateY(${targetAngle}deg)`;
                    pageToTurn.style.zIndex = '100';
                    
                    // Ждем окончания анимации
                    await this.wait(800);
                    
                    // Обновляем состояние
                    this.currentPage = newPage;
                    this.updateDisplay();
                    
                    // Сбрасываем трансформацию
                    pageToTurn.style.transform = 'rotateY(0deg)';
                    pageToTurn.style.zIndex = '2';
                    
                    // Показываем/скрываем страницы
                    this.updatePagesVisibility();
                    
                    // Звук
                    this.playFlipSound();
                }
                
                this.isTurning = false;
            }
            
            goToPage(targetPage) {
                if (targetPage < 1 || targetPage > this.pages.length || this.isTurning) return;
                
                // Простой переход без анимации
                this.currentPage = targetPage;
                this.updateDisplay();
                this.updatePagesVisibility();
            }
            
            updateDisplay() {
                document.getElementById('current-page').textContent = this.currentPage;
                document.getElementById('total-pages').textContent = this.pages.length;
                
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                
                prevBtn.disabled = this.currentPage <= 1;
                nextBtn.disabled = this.currentPage >= this.pages.length;
            }
            
            updatePagesVisibility() {
                this.bookPages.forEach(page => {
                    const pageNum = parseInt(page.dataset.page);
                    const isRight = page.classList.contains('right');
                    
                    if (isRight) {
                        // Правая страница: видна если это следующая за текущей
                        page.style.opacity = pageNum === this.currentPage + 1 ? '1' : '0';
                    } else {
                        // Левая страница: видна если это текущая
                        page.style.opacity = pageNum === this.currentPage ? '1' : '0';
                    }
                });
            }
            
            showStatus(type, message) {
                const status = document.getElementById('status');
                status.className = `status ${type} fade-in`;
                status.textContent = message;
                status.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        status.style.opacity = '0';
                        setTimeout(() => {
                            status.style.display = 'none';
                        }, 300);
                    }, 2000);
                }
            }
            
            playFlipSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 100 + Math.random() * 50;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                } catch (e) {
                    // Браузер не поддерживает
                }
            }
            
            wait(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }
        
        // ЗАПУСК КНИГИ
        window.addEventListener('load', async () => {
            // ВАШИ ФАЙЛЫ
            const imageFiles = [
                'SMART-AV_company0.jpg',   // Страница 1
                'SMART-AV_company1.jpg',   // Страница 2
                'SMART-AV_company2.jpg',   // Страница 3
                'SMART-AV_company3.jpg',   // Страница 4
                'SMART-AV_company4.jpg',   // Страница 5
                'SMART-AV_company5.jpg',   // Страница 6
                'SMART-AV_company6.jpg',   // Страница 7
                'SMART-AV_company7.jpg',   // Страница 8
                'SMART-AV_company8.jpg',   // Страница 9
                'SMART-AV_company9.jpg',   // Страница 10
                'SMART-AV_company10.jpg',  // Страница 11
                'SMART-AV_company11.jpg',  // Страница 12
                'SMART-AV_company12.jpg',  // Страница 13
                'SMART-AV_company13.jpg',  // Страница 14
                'SMART-AV_company14.jpg',  // Страница 15
                'SMART-AV_company15.jpg'   // Страница 16
            ];
            
            try {
                window.book = new SimpleBook('book-container', imageFiles);
            } catch (error) {
                document.getElementById('status').className = 'status error fade-in';
                document.getElementById('status').textContent = `Ошибка: ${error.message}`;
                document.getElementById('status').style.display = 'block';
            }
        });
    </script>
</body>
</html>
