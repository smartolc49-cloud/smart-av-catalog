<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV Каталог</title>
    <style>
        /* Встроенные стили Turn.js */
        .turn-page { background: white; }
        .turn-page-wrapper { position: absolute; width: 100%; height: 100%; }
        
        /* Наши стили */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: white;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #4cc9f0;
        }
        
        .tagline {
            font-size: 18px;
            color: #a0a0c0;
        }
        
        /* Контейнер книги - адаптивный */
        .book-container {
            width: 90vw;
            height: calc(90vw * 0.7); /* пропорция 10:7 */
            max-width: 1000px;
            max-height: 700px;
            margin: 0 auto 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 5px;
            overflow: hidden;
            background: white;
            position: relative;
        }
        
        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .book-container {
                width: 95vw;
                height: calc(95vw * 0.7);
            }
            .logo { font-size: 32px; }
        }
        
        @media (max-width: 480px) {
            .book-container {
                width: 100vw;
                height: calc(100vw * 0.7);
                border-radius: 0;
                margin: 10px 0 20px;
            }
            body { padding: 10px; }
        }
        
        /* Управление */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 12px 30px;
            background: #4cc9f0;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }
        
        .control-btn:hover:not(:disabled) {
            background: #3ab8df;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 201, 240, 0.4);
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            font-size: 20px;
            min-width: 120px;
            text-align: center;
            color: #4cc9f0;
            font-weight: bold;
        }
        
        .hints {
            text-align: center;
            color: #a0a0c0;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 15px;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px auto;
            text-align: center;
            max-width: 500px;
            display: none;
        }
        
        .loading {
            background: rgba(76, 201, 240, 0.1);
            color: #4cc9f0;
            border-left: 4px solid #4cc9f0;
        }
        
        .error {
            background: rgba(255, 100, 100, 0.1);
            color: #ff6464;
            border-left: 4px solid #ff6464;
        }
        
        .success {
            background: rgba(100, 255, 100, 0.1);
            color: #64ff64;
            border-left: 4px solid #64ff64;
        }
        
        /* Страницы */
        .page {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        
        .page-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SMART-AV</div>
        <p class="tagline">Каталог решений</p>
    </div>
    
    <div class="book-container" id="book-container">
        <div id="flipbook"></div>
    </div>
    
    <div id="status" class="status loading">
        Загрузка каталога...
    </div>
    
    <div class="controls">
        <button id="prev-btn" class="control-btn" disabled>◀ Назад</button>
        <div class="page-info">
            <span id="current-page">1</span> / <span id="total-pages">16</span>
        </div>
        <button id="next-btn" class="control-btn" disabled>Вперед ▶</button>
    </div>
    
    <div class="hints">
        <p>Кликните по правой или левой части страницы для перелистывания</p>
        <p>Используйте клавиши ← → на клавиатуре</p>
    </div>

    <script>
        // МИНИМАЛЬНЫЙ FLIPBOOK БЕЗ ВНЕШНИХ БИБЛИОТЕК
        class SimpleFlipbook {
            constructor(containerId, pages) {
                this.container = document.getElementById(containerId);
                this.pages = pages;
                this.currentPage = 1;
                this.isAnimating = false;
                this.init();
            }
            
            init() {
                this.createPages();
                this.render();
                this.setupEvents();
                this.updateControls();
            }
            
            createPages() {
                const flipbook = document.getElementById('flipbook');
                flipbook.innerHTML = '';
                
                this.pages.forEach((filename, index) => {
                    const pageNum = index + 1;
                    const page = document.createElement('div');
                    page.className = 'page';
                    page.dataset.page = pageNum;
                    
                    const img = document.createElement('img');
                    img.src = `images/${filename}`;
                    img.className = 'page-img';
                    img.alt = `Страница ${pageNum}`;
                    img.onerror = () => {
                        img.src = `https://via.placeholder.com/800x600/333/fff?text=Страница+${pageNum}`;
                    };
                    
                    page.appendChild(img);
                    flipbook.appendChild(page);
                });
            }
            
            render() {
                const pages = document.querySelectorAll('.page');
                const containerWidth = this.container.clientWidth;
                
                pages.forEach((page, index) => {
                    const pageNum = index + 1;
                    const isVisible = pageNum === this.currentPage;
                    
                    page.style.position = 'absolute';
                    page.style.width = '100%';
                    page.style.height = '100%';
                    page.style.left = '0';
                    page.style.top = '0';
                    page.style.zIndex = isVisible ? '2' : '1';
                    page.style.opacity = isVisible ? '1' : '0';
                    page.style.transition = 'opacity 0.5s ease';
                    page.style.pointerEvents = isVisible ? 'auto' : 'none';
                });
            }
            
            setupEvents() {
                // Кнопки
                document.getElementById('prev-btn').onclick = () => this.prev();
                document.getElementById('next-btn').onclick = () => this.next();
                
                // Клавиатура
                document.onkeydown = (e) => {
                    if (e.key === 'ArrowLeft') this.prev();
                    if (e.key === 'ArrowRight') this.next();
                };
                
                // Клик по страницам
                document.getElementById('flipbook').onclick = (e) => {
                    const pageWidth = this.container.clientWidth;
                    const clickX = e.clientX - this.container.getBoundingClientRect().left;
                    
                    if (clickX > pageWidth * 0.7) this.next();
                    else if (clickX < pageWidth * 0.3) this.prev();
                };
                
                // Адаптивность
                window.addEventListener('resize', () => {
                    this.render();
                });
            }
            
            prev() {
                if (this.currentPage > 1 && !this.isAnimating) {
                    this.isAnimating = true;
                    this.currentPage--;
                    this.render();
                    this.updateControls();
                    
                    // Звук перелистывания (опционально)
                    this.playFlipSound();
                    
                    setTimeout(() => {
                        this.isAnimating = false;
                    }, 500);
                }
            }
            
            next() {
                if (this.currentPage < this.pages.length && !this.isAnimating) {
                    this.isAnimating = true;
                    this.currentPage++;
                    this.render();
                    this.updateControls();
                    
                    this.playFlipSound();
                    
                    setTimeout(() => {
                        this.isAnimating = false;
                    }, 500);
                }
            }
            
            goToPage(pageNum) {
                if (pageNum >= 1 && pageNum <= this.pages.length && !this.isAnimating) {
                    this.isAnimating = true;
                    this.currentPage = pageNum;
                    this.render();
                    this.updateControls();
                    
                    this.playFlipSound();
                    
                    setTimeout(() => {
                        this.isAnimating = false;
                    }, 500);
                }
            }
            
            updateControls() {
                document.getElementById('current-page').textContent = this.currentPage;
                document.getElementById('total-pages').textContent = this.pages.length;
                
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                
                prevBtn.disabled = this.currentPage <= 1 || this.isAnimating;
                nextBtn.disabled = this.currentPage >= this.pages.length || this.isAnimating;
            }
            
            playFlipSound() {
                try {
                    // Простой звук перелистывания
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 200;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                } catch (e) {
                    console.log("Звук не поддерживается");
                }
            }
        }
        
        // ЗАПУСК ПРИ ЗАГРУЗКЕ СТРАНИЦЫ
        window.onload = function() {
            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            
            // Список ваших файлов
            const imageFiles = [
                'SMART-AV_company0.jpg',
                'SMART-AV_company1.jpg', 
                'SMART-AV_company2.jpg',
                'SMART-AV_company3.jpg',
                'SMART-AV_company4.jpg',
                'SMART-AV_company5.jpg',
                'SMART-AV_company6.jpg',
                'SMART-AV_company7.jpg',
                'SMART-AV_company8.jpg',
                'SMART-AV_company9.jpg',
                'SMART-AV_company10.jpg',
                'SMART-AV_company11.jpg',
                'SMART-AV_company12.jpg',
                'SMART-AV_company13.jpg',
                'SMART-AV_company14.jpg',
                'SMART-AV_company15.jpg'
            ];
            
            // Проверяем загрузку изображений
            let loadedCount = 0;
            const totalImages = imageFiles.length;
            
            function checkImageLoaded(filename) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        loadedCount++;
                        updateStatus();
                        resolve(true);
                    };
                    img.onerror = () => {
                        loadedCount++;
                        updateStatus();
                        resolve(false);
                    };
                    img.src = `images/${filename}?t=${Date.now()}`;
                });
            }
            
            function updateStatus() {
                const percent = Math.round((loadedCount / totalImages) * 100);
                statusEl.innerHTML = `Загрузка: ${percent}% (${loadedCount}/${totalImages})`;
                
                if (loadedCount === totalImages) {
                    // Все проверено, запускаем книгу
                    setTimeout(() => {
                        try {
                            const flipbook = new SimpleFlipbook('book-container', imageFiles);
                            statusEl.className = 'status success';
                            statusEl.innerHTML = '✓ Каталог загружен! Можно листать.';
                            
                            // Авто-скрытие сообщения
                            setTimeout(() => {
                                statusEl.style.display = 'none';
                            }, 3000);
                            
                        } catch (error) {
                            statusEl.className = 'status error';
                            statusEl.innerHTML = `✗ Ошибка: ${error.message}`;
                        }
                    }, 500);
                }
            }
            
            // Запускаем проверку всех изображений
            Promise.all(imageFiles.map(checkImageLoaded))
                .then(results => {
                    const failed = results.filter(r => !r).length;
                    if (failed > 0) {
                        console.warn(`${failed} изображений не загрузились`);
                    }
                })
                .catch(error => {
                    statusEl.className = 'status error';
                    statusEl.innerHTML = '✗ Ошибка проверки файлов';
                });
            
            // Таймаут на случай проблем
            setTimeout(() => {
                if (loadedCount < totalImages) {
                    console.log("Продолжаем загрузку в фоне...");
                }
            }, 5000);
        };
        
        // Быстрые кнопки навигации
        document.addEventListener('DOMContentLoaded', function() {
            const quickNav = document.createElement('div');
            quickNav.className = 'hints';
            quickNav.style.marginTop = '15px';
            quickNav.innerHTML = `
                <div style="margin: 10px 0;">
                    <button onclick="window.flipbook?.goToPage(1)" style="margin: 0 5px; padding: 5px 10px; background: #4cc9f0; border: none; border-radius: 3px; color: #1a1a2e; cursor: pointer;">1</button>
                    <button onclick="window.flipbook?.goToPage(3)" style="margin: 0 5px; padding: 5px 10px; background: #4cc9f0; border: none; border-radius: 3px; color: #1a1a2e; cursor: pointer;">3</button>
                    <button onclick="window.flipbook?.goToPage(8)" style="margin: 0 5px; padding: 5px 10px; background: #4cc9f0; border: none; border-radius: 3px; color: #1a1a2e; cursor: pointer;">8</button>
                    <button onclick="window.flipbook?.goToPage(13)" style="margin: 0 5px; padding: 5px 10px; background: #4cc9f0; border: none; border-radius: 3px; color: #1a1a2e; cursor: pointer;">13</button>
                    <button onclick="window.flipbook?.goToPage(16)" style="margin: 0 5px; padding: 5px 10px; background: #4cc9f0; border: none; border-radius: 3px; color: #1a1a2e; cursor: pointer;">16</button>
                </div>
            `;
            
            document.querySelector('.hints').after(quickNav);
        });
    </script>
</body>
</html>
