<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV Каталог</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }
        h1 { 
            color: white; 
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }
        .book-wrapper {
            width: 100%;
            height: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }
        .page { background: white; }
        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        button {
            padding: 10px 25px;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .page-info {
            color: white;
            font-size: 18px;
            min-width: 120px;
        }
        .hint {
            color: rgba(255,255,255,0.7);
            margin-top: 15px;
            font-size: 14px;
        }
        .error {
            color: #ff6b6b;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        @media (max-width: 768px) {
            .book-wrapper { height: 500px; }
            h1 { font-size: 24px; }
        }
        @media (max-width: 480px) {
            .book-wrapper { height: 400px; }
            .controls { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMART-AV</h1>
        <p class="subtitle">Каталог решений</p>
        
        <div class="book-wrapper">
            <div id="flipbook"></div>
        </div>
        
        <div class="controls">
            <button id="prev-btn">◀ Назад</button>
            <div class="page-info">Страница: <span id="current-page">1</span>/<span id="total-pages">16</span></div>
            <button id="next-btn">Вперед ▶</button>
        </div>
        
        <p class="hint">Кликните по уголку страницы • Используйте клавиши ← →</p>
        
        <div id="error-message" class="error"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
    <script>
        $(document).ready(function() {
            console.log("Страница загружается...");
            
            // СПИСОК ФАЙЛОВ - ТОЧНО ТАК КАК НА GITHUB
            const imageFiles = [
                'SMART-AV_company0.jpg',
                'SMART-AV_company1.jpg', 
                'SMART-AV_company2.jpg',
                'SMART-AV_company3.jpg',
                'SMART-AV_company4.jpg',
                'SMART-AV_company5.jpg',
                'SMART-AV_company6.jpg',
                'SMART-AV_company7.jpg',
                'SMART-AV_company8.jpg',
                'SMART-AV_company9.jpg',
                'SMART-AV_company10.jpg',
                'SMART-AV_company11.jpg',
                'SMART-AV_company12.jpg',
                'SMART-AV_company13.jpg',
                'SMART-AV_company14.jpg',
                'SMART-AV_company15.jpg'
            ];
            
            // Проверяем доступность файлов
            function checkImages() {
                let loaded = 0;
                const total = imageFiles.length;
                
                imageFiles.forEach((file, index) => {
                    const img = new Image();
                    img.onload = function() {
                        loaded++;
                        console.log(`✓ ${file} загружен`);
                        if (loaded === total) {
                            console.log("Все изображения загружены!");
                            createBook();
                        }
                    };
                    img.onerror = function() {
                        console.error(`✗ Ошибка загрузки: ${file}`);
                        $('#error-message').html(
                            `Ошибка: файл ${file} не найден!<br>
                             Проверьте: https://smartolc49-cloud.github.io/smart-av-catalog/images/${file}`
                        ).show();
                    };
                    img.src = `images/${file}?t=${Date.now()}`;
                });
            }
            
            // Создаем книгу
            function createBook() {
                console.log("Создаем книгу...");
                const flipbook = $('#flipbook');
                
                // Очищаем, если что-то есть
                flipbook.empty();
                
                // Добавляем страницы
                imageFiles.forEach((file, index) => {
                    const pageNum = index + 1;
                    flipbook.append(`
                        <div class="page">
                            <img src="images/${file}" 
                                 alt="Страница ${pageNum}"
                                 onerror="this.src='https://via.placeholder.com/800x600/ccc/333?text=Страница+${pageNum}'">
                        </div>
                    `);
                });
                
                // Инициализируем Turn.js
                try {
                    flipbook.turn({
                        width: '100%',
                        height: '100%',
                        autoCenter: true,
                        duration: 700,
                        when: {
                            turned: function(e, page) {
                                $('#current-page').text(page);
                            }
                        }
                    });
                    
                    console.log("Книга создана успешно!");
                    
                    // Кнопки управления
                    $('#prev-btn').click(() => flipbook.turn('previous'));
                    $('#next-btn').click(() => flipbook.turn('next'));
                    
                    // Клавиатура
                    $(document).keydown(function(e) {
                        if (e.keyCode === 37) flipbook.turn('previous');
                        if (e.keyCode === 39) flipbook.turn('next');
                    });
                    
                    $('#total-pages').text(imageFiles.length);
                    
                } catch (error) {
                    console.error("Ошибка Turn.js:", error);
                    $('#error-message').html(
                        `Ошибка инициализации книги: ${error.message}<br>
                         Проверьте подключение библиотек.`
                    ).show();
                }
            }
            
            // Запускаем проверку
            checkImages();
            
            // Если через 5 секунд ничего не произошло
            setTimeout(() => {
                if ($('#flipbook').children().length === 0) {
                    $('#error-message').html(
                        `Проверьте:<br>
                         1. Файлы в папке images/<br>
                         2. Права доступа<br>
                         3. Консоль браузера (F12)`
                    ).show();
                }
            }, 5000);
        });
    </script>
</body>
</html>
