<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV | Книга с разворотами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a2a, #1a1a40);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 20px;
            transition: background 0.5s;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 1200px;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 200, 255, 0.4);
        }
        
        .logo span {
            color: #00c8ff;
        }
        
        .subtitle {
            color: #a0b0ff;
            font-size: 16px;
            opacity: 0.9;
        }
        
        /* КОНТЕЙНЕР КНИГИ */
        .book-container {
            width: 1000px;
            height: 700px;
            position: relative;
            perspective: 2500px;
            margin: 0 auto 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        
        @media (max-width: 1100px) {
            .book-container {
                width: 95vw;
                height: calc(95vw * 0.7);
            }
        }
        
        /* КНИГА */
        #book {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        /* РАЗВОРОТ */
        .spread {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        
        /* СТРАНИЦЫ В РАЗВОРОТЕ */
        .page {
            width: 50%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: white;
        }
        
        /* ЛЕВАЯ СТРАНИЦА РАЗВОРОТА */
        .page.left {
            transform-origin: right center;
        }
        
        /* ПРАВАЯ СТРАНИЦА РАЗВОРОТА */
        .page.right {
            transform-origin: left center;
        }
        
        /* ИЗОБРАЖЕНИЕ */
        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }
        
        /* УГОЛКИ ДЛЯ ПЕРЕЛИСТЫВАНИЯ */
        .page-corner {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: pointer;
            z-index: 100;
            transition: background 0.3s;
        }
        
        /* ПРАВЫЙ УГОЛ ПРАВОЙ СТРАНИЦЫ */
        .page.right .page-corner {
            top: 0;
            right: 0;
            background: linear-gradient(225deg, transparent 50%, rgba(0, 200, 255, 0.1) 50%);
        }
        
        .page.right .page-corner:hover {
            background: linear-gradient(225deg, transparent 50%, rgba(0, 200, 255, 0.25) 50%);
        }
        
        /* ЛЕВЫЙ УГОЛ ЛЕВОЙ СТРАНИЦЫ */
        .page.left .page-corner {
            top: 0;
            left: 0;
            background: linear-gradient(135deg, transparent 50%, rgba(0, 200, 255, 0.1) 50%);
        }
        
        .page.left .page-corner:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(0, 200, 255, 0.25) 50%);
        }
        
        /* НОМЕР СТРАНИЦЫ */
        .page-number {
            position: absolute;
            bottom: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }
        
        .page.left .page-number {
            left: 15px;
        }
        
        .page.right .page-number {
            right: 15px;
        }
        
        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 25px 0;
            padding: 15px 30px;
            background: rgba(0, 15, 30, 0.8);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        
        .control-btn {
            padding: 14px 35px;
            background: linear-gradient(135deg, #00c8ff, #0088dd);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0, 200, 255, 0.4);
        }
        
        .control-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 200, 255, 0.6);
        }
        
        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .page-info {
            font-size: 24px;
            color: #00c8ff;
            font-weight: 700;
            min-width: 140px;
            text-align: center;
        }
        
        .page-info span {
            color: white;
            font-size: 28px;
        }
        
        /* БЫСТРАЯ НАВИГАЦИЯ */
        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
            max-width: 800px;
        }
        
        .quick-btn {
            padding: 8px 15px;
            background: rgba(0, 200, 255, 0.1);
            border: 1px solid rgba(0, 200, 255, 0.3);
            color: #00c8ff;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .quick-btn:hover {
            background: rgba(0, 200, 255, 0.2);
        }
        
        .quick-btn.active {
            background: #00c8ff;
            color: #0a0a2a;
        }
        
        /* СТАТУС */
        .status {
            padding: 15px 30px;
            border-radius: 10px;
            margin: 20px auto;
            text-align: center;
            max-width: 500px;
            display: none;
        }
        
        .loading {
            background: rgba(0, 200, 255, 0.1);
            color: #00c8ff;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        
        .success {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff80;
            border: 1px solid rgba(0, 255, 100, 0.3);
        }
        
        /* ПОДСКАЗКА */
        .hint {
            color: #8899cc;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            line-height: 1.5;
        }
        
        /* АНИМАЦИЯ ПЕРЕЛИСТЫВАНИЯ СТРАНИЦЫ */
        .page.turning {
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        /* ЭФФЕКТ БУМАГИ */
        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to right, 
                rgba(0,0,0,0) 0%,
                rgba(0,0,0,0.02) 20%,
                rgba(0,0,0,0.03) 50%,
                rgba(0,0,0,0.02) 80%,
                rgba(0,0,0,0) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SMART<span>AV</span></div>
        <p class="subtitle">Книга с правильными разворотами: 1, 2-3, 4-5, 6-7...</p>
    </div>
    
    <div class="book-container">
        <div id="book"></div>
    </div>
    
    <div id="status" class="status loading">
        Создание книги с разворотами...
    </div>
    
    <div class="control-panel">
        <button id="prev-btn" class="control-btn" disabled>
            <span style="font-size: 24px;">◀</span> Назад
        </button>
        
        <div class="page-info">
            <span id="current-spread">1</span> / <span id="total-spreads">9</span>
        </div>
        
        <button id="next-btn" class="control-btn" disabled>
            Вперед <span style="font-size: 24px;">▶</span>
        </button>
    </div>
    
    <div class="quick-nav" id="quick-nav"></div>
    
    <div class="hint">
        <p>• Разворот 1: Страница 1</p>
        <p>• Разворот 2: Страницы 2-3</p>
        <p>• Разворот 3: Страницы 4-5</p>
        <p>• И так далее до разворота 9: Страница 16</p>
    </div>

    <script>
        // КНИГА С ПРАВИЛЬНЫМИ РАЗВОРОТАМИ
        class SpreadBook {
            constructor(containerId, pageImages) {
                this.container = document.getElementById(containerId);
                this.pageImages = pageImages; // 16 файлов
                this.totalPages = pageImages.length;
                this.currentSpread = 0; // 0 = первая страница, 1 = 2-3, 2 = 4-5...
                this.isTurning = false;
                this.spreads = []; // Массив разворотов
                
                this.init();
            }
            
            async init() {
                await this.createSpreads();
                this.setupControls();
                this.showSpread(0);
                this.updateControls();
                
                this.showStatus('success', '✓ Книга создана! Развороты: 1, 2-3, 4-5, 6-7...');
            }
            
            // СОЗДАЕМ РАЗВОРОТЫ
            async createSpreads() {
                this.container.innerHTML = '';
                
                // РАЗВОРОТ 0: Первая страница (1)
                const firstSpread = this.createSpread(0, [0]); // Страница 1
                this.container.appendChild(firstSpread);
                this.spreads.push(firstSpread);
                
                // РАЗВОРОТЫ 1-7: Пары страниц
                for (let i = 1; i < this.totalPages - 1; i += 2) {
                    const spreadIndex = Math.floor(i / 2) + 1;
                    const pageIndices = [i, i + 1]; // [2,3], [4,5], [6,7]...
                    
                    const spread = this.createSpread(spreadIndex, pageIndices);
                    this.container.appendChild(spread);
                    this.spreads.push(spread);
                }
                
                // РАЗВОРОТ 8: Последняя страница (16) - если нечетное количество
                if (this.totalPages % 2 === 0) {
                    const lastSpread = this.createSpread(this.spreads.length, [this.totalPages - 1]);
                    this.container.appendChild(lastSpread);
                    this.spreads.push(lastSpread);
                }
            }
            
            // СОЗДАЕМ ОДИН РАЗВОРОТ
            createSpread(spreadIndex, pageIndices) {
                const spread = document.createElement('div');
                spread.className = 'spread';
                spread.dataset.spread = spreadIndex;
                
                // Считаем номера страниц
                const leftPageNum = pageIndices[0] + 1;
                const rightPageNum = pageIndices[1] ? pageIndices[1] + 1 : null;
                
                // ЛЕВАЯ СТРАНИЦА РАЗВОРОТА
                if (pageIndices[0] !== undefined) {
                    const leftPage = this.createPageElement(
                        leftPageNum, 
                        this.pageImages[pageIndices[0]], 
                        'left',
                        spreadIndex === 0 // Первая страница без уголка слева
                    );
                    spread.appendChild(leftPage);
                }
                
                // ПРАВАЯ СТРАНИЦА РАЗВОРОТА
                if (rightPageNum) {
                    const rightPage = this.createPageElement(
                        rightPageNum, 
                        this.pageImages[pageIndices[1]], 
                        'right',
                        spreadIndex === this.spreads.length && pageIndices.length === 1 // Последняя без уголка справа
                    );
                    spread.appendChild(rightPage);
                }
                
                // Позиционируем разворот
                spread.style.transform = `translateX(${spreadIndex * 100}%)`;
                
                return spread;
            }
            
            // СОЗДАЕМ СТРАНИЦУ
            createPageElement(pageNum, imageSrc, side, isSinglePage = false) {
                const page = document.createElement('div');
                page.className = `page ${side}`;
                page.dataset.page = pageNum;
                page.dataset.side = side;
                
                // Изображение
                const img = document.createElement('img');
                img.className = 'page-image';
                img.src = `images/${imageSrc}`;
                img.alt = `Страница ${pageNum}`;
                img.onerror = () => {
                    img.style.background = '#f0f0f0';
                    img.style.display = 'flex';
                    img.style.alignItems = 'center';
                    img.style.justifyContent = 'center';
                    img.innerHTML = `<div style="color:#666;font-size:24px;">${pageNum}</div>`;
                };
                
                // Уголок для перелистывания (если не первая/последняя одиночная)
                if (!isSinglePage) {
                    const corner = document.createElement('div');
                    corner.className = 'page-corner';
                    corner.title = side === 'right' ? 'Перелистнуть вперед' : 'Перелистнуть назад';
                    page.appendChild(corner);
                }
                
                // Номер страницы
                const number = document.createElement('div');
                number.className = 'page-number';
                number.textContent = pageNum;
                
                page.appendChild(img);
                page.appendChild(number);
                
                return page;
            }
            
            setupControls() {
                // Кнопки
                document.getElementById('prev-btn').addEventListener('click', () => this.turnPage(-1));
                document.getElementById('next-btn').addEventListener('click', () => this.turnPage(1));
                
                // Клавиатура
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.turnPage(-1);
                    if (e.key === 'ArrowRight') this.turnPage(1);
                });
                
                // Быстрая навигация
                this.createQuickNavigation();
                
                // События для уголков
                this.setupPageCorners();
            }
            
            setupPageCorners() {
                // Обработчики для уголков
                document.addEventListener('click', (e) => {
                    if (e.target.classList.contains('page-corner')) {
                        const page = e.target.closest('.page');
                        const side = page.dataset.side;
                        
                        if (side === 'right') {
                            this.turnPage(1); // Вперед
                        } else if (side === 'left' && this.currentSpread > 0) {
                            this.turnPage(-1); // Назад
                        }
                    }
                });
                
                // Перетаскивание уголков
                document.addEventListener('mousedown', (e) => {
                    if (e.target.classList.contains('page-corner')) {
                        const page = e.target.closest('.page');
                        const side = page.dataset.side;
                        const startX = e.clientX;
                        
                        const handleMouseMove = (moveEvent) => {
                            const deltaX = moveEvent.clientX - startX;
                            
                            if (side === 'right' && deltaX < -50) {
                                this.turnPage(1);
                                document.removeEventListener('mousemove', handleMouseMove);
                            } else if (side === 'left' && deltaX > 50) {
                                this.turnPage(-1);
                                document.removeEventListener('mousemove', handleMouseMove);
                            }
                        };
                        
                        const handleMouseUp = () => {
                            document.removeEventListener('mousemove', handleMouseMove);
                            document.removeEventListener('mouseup', handleMouseUp);
                        };
                        
                        document.addEventListener('mousemove', handleMouseMove);
                        document.addEventListener('mouseup', handleMouseUp);
                    }
                });
            }
            
            createQuickNavigation() {
                const quickNav = document.getElementById('quick-nav');
                
                // Кнопки для каждого разворота
                for (let i = 0; i < this.spreads.length; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'quick-btn';
                    
                    // Определяем какие страницы в развороте
                    if (i === 0) {
                        btn.textContent = '1';
                        btn.title = 'Страница 1';
                    } else if (i === this.spreads.length - 1 && this.totalPages % 2 === 0) {
                        btn.textContent = this.totalPages.toString();
                        btn.title = `Страница ${this.totalPages}`;
                    } else {
                        const firstPage = i * 2;
                        const secondPage = firstPage + 1;
                        btn.textContent = `${firstPage}-${secondPage}`;
                        btn.title = `Страницы ${firstPage}-${secondPage}`;
                    }
                    
                    btn.dataset.spread = i;
                    btn.addEventListener('click', () => this.goToSpread(i));
                    quickNav.appendChild(btn);
                }
            }
            
            async turnPage(direction) {
                if (this.isTurning) return;
                
                const newSpread = this.currentSpread + direction;
                if (newSpread < 0 || newSpread >= this.spreads.length) return;
                
                this.isTurning = true;
                
                // Анимация перехода
                this.container.style.transform = `translateX(${-newSpread * 100}%)`;
                
                // Звук
                this.playFlipSound();
                
                // Ждем завершения анимации
                await new Promise(resolve => setTimeout(resolve, 800));
                
                this.currentSpread = newSpread;
                this.showSpread(this.currentSpread);
                this.updateControls();
                
                this.isTurning = false;
            }
            
            showSpread(spreadIndex) {
                // Скрываем все развороты
                this.spreads.forEach(spread => {
                    spread.style.opacity = '0.3';
                });
                
                // Показываем текущий разворот
                if (this.spreads[spreadIndex]) {
                    this.spreads[spreadIndex].style.opacity = '1';
                }
                
                // Обновляем активную кнопку
                document.querySelectorAll('.quick-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (parseInt(btn.dataset.spread) === spreadIndex) {
                        btn.classList.add('active');
                    }
                });
            }
            
            goToSpread(spreadIndex) {
                if (spreadIndex < 0 || spreadIndex >= this.spreads.length || this.isTurning) return;
                
                this.currentSpread = spreadIndex;
                this.container.style.transform = `translateX(${-spreadIndex * 100}%)`;
                this.showSpread(spreadIndex);
                this.updateControls();
                this.playFlipSound();
            }
            
            updateControls() {
                document.getElementById('current-spread').textContent = this.currentSpread + 1;
                document.getElementById('total-spreads').textContent = this.spreads.length;
                
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                
                prevBtn.disabled = this.currentSpread <= 0 || this.isTurning;
                nextBtn.disabled = this.currentSpread >= this.spreads.length - 1 || this.isTurning;
            }
            
            playFlipSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 120 + Math.random() * 40;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.02, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                } catch (e) {
                    // Браузер не поддерживает
                }
            }
            
            showStatus(type, message) {
                const status = document.getElementById('status');
                status.className = `status ${type}`;
                status.textContent = message;
                status.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        status.style.opacity = '0';
                        setTimeout(() => {
                            status.style.display = 'none';
                        }, 500);
                    }, 2000);
                }
            }
        }
        
        // ЗАПУСК КНИГИ
        window.addEventListener('load', () => {
            const imageFiles = [
                'SMART-AV_company0.jpg',   // 1
                'SMART-AV_company1.jpg',   // 2
                'SMART-AV_company2.jpg',   // 3
                'SMART-AV_company3.jpg',   // 4
                'SMART-AV_company4.jpg',   // 5
                'SMART-AV_company5.jpg',   // 6
                'SMART-AV_company6.jpg',   // 7
                'SMART-AV_company7.jpg',   // 8
                'SMART-AV_company8.jpg',   // 9
                'SMART-AV_company9.jpg',   // 10
                'SMART-AV_company10.jpg',  // 11
                'SMART-AV_company11.jpg',  // 12
                'SMART-AV_company12.jpg',  // 13
                'SMART-AV_company13.jpg',  // 14
                'SMART-AV_company14.jpg',  // 15
                'SMART-AV_company15.jpg'   // 16
            ];
            
            try {
                window.book = new SpreadBook('book', imageFiles);
            } catch (error) {
                const status = document.getElementById('status');
                status.className = 'status loading';
                status.textContent = `Ошибка: ${error.message}`;
                status.style.display = 'block';
            }
        });
    </script>
</body>
</html>
