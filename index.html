<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AV | Каталог</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .book-container {
            width: 100%;
            height: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 5px;
            overflow: hidden;
            background: white;
        }
        
        .page {
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .simple-controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        
        .page-info {
            font-size: 16px;
            color: #333;
            min-width: 100px;
        }
        
        .nav-btn {
            padding: 8px 20px;
            background: #4a6fa5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .nav-btn:hover {
            background: #3a5a8a;
        }
        
        .hint {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .book-container {
                height: 500px;
            }
        }
        
        @media (max-width: 480px) {
            .book-container {
                height: 400px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMART-AV</h1>
        <p class="subtitle">Каталог решений</p>
        
        <div class="book-container">
            <div id="flipbook">
                <!-- Страницы добавятся автоматически -->
            </div>
        </div>
        
        <div class="simple-controls">
            <button id="prev-btn" class="nav-btn">◀ Назад</button>
            <div class="page-info">
                Страница: <span id="current-page">1</span> из <span id="total-pages">16</span>
            </div>
            <button id="next-btn" class="nav-btn">Вперед ▶</button>
        </div>
        
        <p class="hint">
            Кликните по уголку страницы для перелистывания • Используйте клавиши ← →
        </p>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
    <script>
        $(document).ready(function() {
            // Создаем 16 страниц
            const flipbook = $('#flipbook');
            for (let i = 1; i <= 16; i++) {
                flipbook.append(`
                    <div class="page">
                        <img src="images/page${i}.jpg" alt="Страница ${i}">
                    </div>
                `);
            }
            
            // Инициализируем книгу
            flipbook.turn({
                width: '100%',
                height: '100%',
                autoCenter: true,
                duration: 600,
                acceleration: true,
                gradients: true
            });
            
            // Обновляем номер страницы
            flipbook.bind('turned', function(e, page) {
                $('#current-page').text(page);
            });
            
            // Кнопки управления
            $('#prev-btn').click(function() {
                flipbook.turn('previous');
            });
            
            $('#next-btn').click(function() {
                flipbook.turn('next');
            });
            
            // Управление с клавиатуры
            $(document).keydown(function(e) {
                if (e.keyCode === 37) { // Стрелка влево
                    flipbook.turn('previous');
                    e.preventDefault();
                }
                if (e.keyCode === 39) { // Стрелка вправо
                    flipbook.turn('next');
                    e.preventDefault();
                }
            });
            
            $('#total-pages').text('16');
        });
    </script>
</body>
</html>
